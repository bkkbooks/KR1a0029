body:
  text: 易原易類提要臣等謹案易原八卷宋程大昌撰大昌字泰之休寧人紹興二十一年進士歷官權吏部尚書龍圖閣直學士諡文簡大昌學術湛深於諸經皆有論說以易義自漢以來糾紛尤甚因作是書以貫通之苦思力索四年而成宋藝文志文獻通考皆著於録陳振孫稱其首論五十有五之數參之圖書大衍為易之原而卦變揲法皆有圖論往往斷以己見出先儒之外今考其所論分爻值日乃京焦卦氣其始于中孚本用太初法與夫子所謂乾坤之策當期之日者不合復姤生卦說始邵子但乾坤生六子說卦傳有明文不得先有六畫之卦後有三畫之卦鄭康成用十日十二辰二十八宿以應大衍五十之數本於乾鑿度與馬融之增北辰荀爽之增用九用六不過以意決比附初無不易之理張行成别立二十五數以推大衍則是五十有五數之外别有二十五數更非孔子所曽言其參互折衷皆能根據大傳旁通交推於易義實有所闡發不徒文詞之辨博己也其書久無傳本惟程敏政新安文獻志載有三篇故朱彞尊經義考以為已佚今散見於永樂大典中者採掇得百有餘篇尚為完整謹釐訂編次分為八卷大昌禹貢圖說嘗刻入通志堂經解中脫佚不完已從永樂大典考輯補正今是書復為裒綴成編數百年諸儒未見之本重得表章傳世庶俾大昌撰述之苦心藉以不泯焉乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:957ae24e6d856d4c0f1381c16105e0130e14f7352578eebbd538f97ca5e605c0
