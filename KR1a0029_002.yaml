body:
  text: 易原卷二宋程大昌撰論十八篇一五為變始其數不定一水三木受數于天而未有得乎地二火四金受數于地而未有得乎天若夫五則天生之地承之地天于此乎交變化于此乎起則與向之水火木金絶異矣自有此五以後竒耦皆變矣向之得一者合五為六而水行遂成矣以其生于陽而成隂也向之得二者以合為五七而火行亦成矣以其生于隂而成于陽也木三金四之得五而成八成九者亦皆一理也漢志推説五行生克而曰五位皆以五合而隂陽易位者正指此也詳見五行生克論故五位皆以生成之衝變化之始也非如四行之質一受定形而遂不能流變也方其應感則五之氣固已分播于所王之方及其凝聚則五之體又皆隨著于賦物之地故五能冒四而四亦載五也從其播而命之則一五固可該四矣隨其著而言之則四之成體者亦可指為五之託體也是以五之為數時隱時見而多少不可得齊也河圖一之是示其生于本數而寓其成于四行也洛書有五而又有十則本其生以為已生而收四行之成以為已成也則其多少不齊皆不害其為紀實也大衍者本五行之數而通其變故雖依並五行而非正以五行為用也故五十數者所以多于圖而減于書也至此則當從設數求之不可概泥定數也矣設數本數詳見論數二土之立數不常河圖之一其五者何也四宗乎五故成并于生也土之生也受其竒于天而會其耦于地其孑然而獨立也以至該之體擅至中之位故能四而受感分氣而應也播于四時散于萬物無所不蔇亦無不遍遇水火則與之為水火值金木則與之為金木氣分于此質成于彼故凡四之成材者皆五之委形也所謂寄旺四季者正其凡最也故成數可以并乎生數也圖之特出一五而寓成于八列不自著十者正以此也天地所布洛書所畫既有一五又則出二五者何也一五之君四氣也其理固無異于河圖也然而四氣得五而變數既增多四行亦益閎大則其增立二五正收四行之成而總之于己也百昌皆生于土而反于土人物禽獸凡有形質而粲然神竒莫不終于臭腐而復乎壤地也所謂木落還糞其本者特從速化而易見者舉以為况耳類而推之何時而不有此物何物而不復乎此土也則土雖不能自生其質而四材亦能與之為質也是雖下同四行受五之例而兩其五以識成亦有其理也三五行主五遺十一五中土授四行以生而不居其成此正理也土無生土之理故五土之數不當更增二五也天地洛書土皆有十而圖獨無十者五能變而十不能變也圖之所主者制變也十隱于四行之八八者可見而十不可見故圖惟一五也不曰自一而萬無所用十也若究求制變之元則一五之外尚無二五况可重之以及于三五也乎故古書之並數言變者皆極九而遺十也吕氏月令即周公時訓也其繫五行于四時也冬六夏七春八秋九皆成數也惟中土則不十而五者亦以變言故不著其成也黃帝岐伯之講明五德也他皆紀成而中土仍自紀生也又從而明為之言曰五常之德土數常生釋之者曰正土不以虛加此最知本也加者一之加五而為六者也二三四之加五而為七八九者也皆其主五而加焉者也四行本無其成而皆資成于土焉故四行之數悉可隨加也若夫五之為土則正土也既自為土誠使更益一土則決不能有所孳息故地十之十名為虛加也四土數不可虛加五行造化其底藴難究矣五材也者皆凝五德以成其質者也從其凝以推其所從得凝庶其可以循影想形也矣今夫雨泉之水五之得金木之得土火之得木皆孕體于地而得此形質者是異類能生異類之驗也九仞之山中天之臺長城千里其培積非不厚且多也而常聞止簣休役之後復有毫毛增長如世傳息壤之怪乎則同類不能自相生育其驗甚明也其曰正土不以虛加者言因土得形而可以形加者皆非正土也故天五可以總變而地之二其五者不能也黃岐之論又曰天有九宫不可至十九宫云者五行逰變之方也正並圖之九位而立為此名也故循五行而言者常至九而極也蓋洪範之言五行也鹹酸苦辛甘者五材之已成五味者也既其成味則不可復指為生矣然其列敘五數則水一火二木三金四土五遂皆舍其成而言其生也是亦黃岐周公之意也及其著稼穡于土行而反援潤下炎上曲直從革四者以自例正欲著其重榖之意以成養民之德焉耳然而稼穡出于人力終不與炎潤之類實為本性者同也故四行之凝聚也其有性可名者率能蔽以一言曰炎曰潤之類是也而土爰稼穡云者于是乎可稼可穡焉耳此即因其實而别言之者也禹于此亦遂别創一橅出五行之外而命為六府知其不可強以傳致也然則五行也者禹能增一榖而六其五矣終不能正歸其甘于土此非不可虛加之類耶五太玄無十太玄五行其生成位置全與洛書數合其言曰一與六共宗二與七共朋三與八成友四與九同道夫宗朋友道皆以耦言也正今圖之生成相襲者也其成數多于生數則皆經五而加焉者也若夫五五相守也者揆以今圖則其一列已自為五其一列又自為十不止于兩五而已也雄以五五之外不言更有餘數也豈有隱天五于數總而獨析地十以為兩五也耶然雄之書有五無十者觸類皆是也充其三方而九之九九而八十一是其具九贊以成其為元者也而九贊亦遂盡九而止不更演也至于四行記數則水火木金皆兼生成兩數也土之五五雖嘗駢立兩五亦不正名為十也其意實存能變之五而不主不變之十也又其推天地人體屬序之類皆至九而極則雄其有得于列子究九者歟而古之名事名物率以九紀又可觸類而推也六古數主九上古之世治道人事多以九名如三皇之世九邱九扈堯禹之世九州九官九疇九歌九德九鼎九功九共黜陟之用九載簫韶之極九成皆九也六以十竟也周制之存乎周官者特詳矣而九職九賦九式九貢九兩九儀九命九夏九簭九祭九摻九伐九畿九服皆不于十取數也總而言之則六卿六屬己象天道而必增三孤以為九卿亦其理也九州雖嘗患其太廣析為十二無何復九終三代不能易也此亦一理也又如九疇之别類也咎證休證既已合為一疇五福六極又復合為一疇推原其意殆謂吉凶雖反而事類正同故合二為一無礙也然則五事即五行之在人者矣三德即皇極之應變者矣則夫五事之與五行皇極之與三德亦當合為兩疇矣而何以遂離為四也哉用此理以推禹意則夫九疇矣或離或合義例不同而必欲遷就以成為九焉耳也古人尊九乃不謀而同如此哉説右列子言一變為七七變為九蓋以天一至天九者言之也水火木金土皆有形矣而水居其首故一為形變之始也形變至九則天五之氣周行乎四德者已極乎此不可他變故曰九者究也按列子作九變者究也九復變一則金實生水也金九而水一故也若夫輕清而上為天重濁而下為地則其别自更端以言人事者耳故繼之曰沖和氣者為人也則列子之指形變蓋自天一而始也八列子言河圖列子之言數變曰易變而為一一變而為七七變而為九九者究也復變為一一者形變之始也此正疏説太極不入形變而河圖數當極九者也此之謂一蓋實天一之一而非太極之一也是取其已形者而言之也至夫易無形埒也者乃始正指未形之太極也易者夷易之謂也非變易之易也天地已判乃始有形故一為變始而夷易無形埒之地方且混淪無朕也則安得有變可言有一可數也夫非太極而孰能與此也張湛釋列子至形埒之語云不知形下一字按字書讀如垺以耕田起土為義其曰易無形埒則直混然而已太極之混成渾淪者是矣及乎夷易無形埒者又動而至于可以生物也則天也者實為形始而一也者實為數始也至此而後其形埒始著也故夷易所變之一乃為有形之一而太極渾淪者未嘗著形而亦未及乎變也九列子言河圖一遽變七七遽變九九復變一諸家皆知其為易發理而無有能言其宿者惟張湛之言為得也曰一變為七九不以次數者全舉陽數領其都會也夫一三五七九者陽之全數也二四六八者隂數之對變而包乎陽數之內者也既其從陽數之會舉一七九以該三五則夫二四六八亦皆包乎陽變之內矣不待枚數也若夫十土非不預變也能生成四行而不肯自為四行故仗五以出變而十之為數遂暗寓乎四生四成之列也是以數變者以九為極也以天地十數之效乎四時者觀之冬水春木夏火中土秋金即其一三七五九形變之序矣秋之金其數九而九不變十也乃復變水水之數一是九復變一也者復從形變之𥘉循環再起者也故凡列子此語専以發明太極之無數而河圖之無十者也若用無形埒之夷易以豉反以為變易之易音亦則失之逺矣而理亦不貫也蓋列子此語惟從易理以求則遂可曉而舍易則無見也豫嘗深探老氏一教見其綱條悉自易出而其徒相與極口詆訾孔子則遂疑其嘗見繫辭太極兩儀之序而恥其不能終成一家則遂立詆以自文也詳見易老通言十五行生位本是王位謂天地五𥘉數為五行𥘉度後五數為五行增數古固有知之者矣至其名先五為生名後五為成則至漢人實始詳言也然而四氣所生自直亥寅已申而一二三四之直子午卯酉者乃四氣王地耳然則漢儒何所取則而萬世何以無議也是特主五以推變化而不専為四氣發凡也蓋禆竈占陳以五德言之謂其興復之數當在五故漢儒訓釋其義曰天以一生水地以二生火天以三生木地以四生金天以五生土五位皆以五而隂陽易位故曰妃以五成也然則水之大數六火七木八金九土十也凡其言五行生成至此而加詳矣審求其理實皆以變五為成而四時生王非所専主也若從五行生成而推易數之生成則泥矣十一八卦無土卦圖地六水坤地四金兑天九金乾地二火離天一水坎地八木巽天三木震天七火艮十二八卦不立土卦四行之在卦也其有數可數者巽八震三之為木離二艮七之為火兑四乾九之為金坎一坤六之為水總而計之則為四者凡十是四行生成短長相補合而數之可及四十矣至夫天五地十也者四行依之以成其體者也乃遂無卦可立無數可推以較天地圖書不獨無十亦且無五矣此正大衍受河圖減五之則而定著以為卦數者也夫五之無也豈其八卦自能變化也哉土之施德乎四象己成功用至于可爻可卦則五也十也皆藏乎四象已成之畫矣觀易者茍其于此有見則夫卦之六十有四者雖無主土専立之卦而爻之三百八十有四者亦無一爻焉而能不載乎土也安用局乎卦爻而下與四行同體也哉故説卦枚數八列名數而曰此其秋也此其水也曰秋者不過域乎四時曰水者不能外乎四德也而土也元不隸時亦不著德以見其該也及夫卦之已成則不問何卦凡六其爻者率皆指五以為宗主則五亦不能終藏也此其致甚邃也豫既得此理矣于是始從無卦無爻之地而探求夫天五地十之所存也十三八卦分載土德土之用事回復隱顯不主故常故自圖書以及大衍立數寫肖則皆時多時少不可準度説者病其無居則遂依時日以立分際故其言曰土王四季各十八日此其為説蓋深明乎四行之載土而土五之能冒四也故于一時之九十日者五分而取其一以為土日也合四時所取各十八日而絫數之則其為日蓋七十有二也積七十二者五而為當期之日則是土之一德亦常居其五一也此其分際確乎其能得五土該四之分矣苐其于四季中剟取一十八日以為土日則或執而不通焉耳詳見後篇然其意可師也若能放之而求土數于分五隱一之地則五雖不自立卦而卦皆涵五也惟夫讀易者得其言而不得其所以言乃遂欲以三百八十四爻者均配乎三百六十日于是以一爻配對一日而餘遺二十四爻無日可配則又多方其説而反以汨易也十四分爻當日遂至别異四卦分爻當日皆經生以意言之𥘉無易據也其説或曰乾坤坎離者天地日月也或曰坎離震兌分主四氣而運行之不自囿于五行也或曰八𥘉卦之爻既為卦祖矣及其疊𥘉卦以為重卦也本氣用盡而他氣迭起則夫八純卦之本爻不更入用也説凡三變而皆黜除卦象乃得傅會乎二十四爻之不用也此其為皆不通也且以易類推之乾坤之有用九用六也為夫六爻不足以盡其意而遂别設二用以救亢戰之過也則八八相承而為六十四爻者卦之與爻率皆相須以承四氣安有虛卦虛爻不麗于用者耶且其謂乾坤不用猶其稍稍並本矣坎離者水火也冬夏也何為而不入于用也若曰水火者日月也日月可以該冒他卦則震雷巽風其用狹于日月而水火二象亦何從而得專生成也若曰隂陽之義配日月日月者隂陽之著象而可該他卦者也則夫山澤通氣氣非隂陽也乎雷風相薄雷風非隂陽而孰與為體也至謂震離坎兑分位四正可該他卦則乾坤豈不該于四氣也耶夫乾坤兩卦不止六爻皆用而乂增設兩辭以極其至則四卦之爻安得不用也又謂八卦本氣不用可虛諸用外則夫八初卦也者皆以六爻入諸六十四重卦則既分應氣令無一畫可除也夫既無畫可除則其本氣何嘗用盡也凡此數者皆易之大節也而其無宿且猶如此豫故詳思其以而得其致誤之由也蓋夫子之言䇿也曰乾坤之三百六十者可以當一期之日也此其所指則乾坤十二爻之策也𥘉無與乎六十二卦之爻也若其䇿之在卦則夫萬有一千二百五十者夫子明以配對萬物而未嘗用以配日也此其為誤自當質夫子而正之不當襲誤生誤也十五分日應五行纍四時之日而每季取其十有八者以為土王之日其為分四載五之理固甚邃矣而分日寄王之説則泥也姑以春序而例其餘則可見矣木德用事則凡九十日發生者莫非春也孰使春而能出此之生則土德其實為之也凡其死者茁枯者榮則春固有象矣而土之授春以生者漠乎其無朕也茍欲于九十日之末剟取十有八者而曰此土德之寄旺乎四季者也則又當别存七十二者而曰此木德之實旺者也其説若可聽矣不知立何為際而名何日以為土王也又不知十八日者安得别有竒力以自表乎木德之外而云不為木王之日也然則十有八日云者吾知其説矣約其分際猶曰五德者率五而均計則土力當居其一也惟其日之三百六十者分當為一期故其分際可數因得借之以諭率分焉耳若師其意通其泥常于土德隱而不見之地五分四德而取其一以明土力則凡五之能該四也四之當載五也皆有宿矣而三百八十四爻者亦可隨卦當時而無所贅虧凡其傅會之説皆遂可徹也十六立分當日十六卦而當一時則此之九十六爻者皆當隨時用事如在春則皆為木德而在夏皆為火德其類可推也積而致之嵗竟則四其三月者月仍各以九十六爻為四德分王之日而土德之居五一者自在其中也蓋四德也者無一日焉可以離土則是三百八十四爻也者亦無一爻焉而能不載乎土也土之兼冒四時也其力雖散而薄然而合四時之薄以概一時之王則總三百八十四爻之力土當據其爻之七十六而竒也此非襲其舊失而専以爻計之無所寄而均計之無所寄算姑此率爻而言也若夫當日之卦則自有定位矣卦有定位則爻亦隨卦以𨽻乎四時也以此立則是每卦每爻悉皆有土不至如分爻之執泥也十七六日七分分爻起于爻卦而卦之當日也其説出于易緯謂以六十卦而分直三百六十五度四分度之一也一卦而當六日則六十卦已為三百六十日矣然尚餘五日以及四分日之一者未有所宿則遂用此之五日有竒者析一日以為八十分積四百二十分而五日有竒者乃始有宿也故六十卦者既皆全受六日又當别受七分也此其所從以為六日七分之則也後人因而推廣之則不止分卦而已也乃遂至于分爻也然嘗審而求之則知其破碎無理當不足尚矣何者秋冬之氣不可以入之春夏亦猶隂卦之爻不可入諸陽卦也今也不分四季之屈信不立八卦之分際概以一日析為八十分而凡卦均受七分固可以傳足乎周天之度矣而其大不通者勢必至于分爻以出卦外則必有卦陽而爻隂者矣亦有卦隂而爻陽者矣其為破碎不待多辨也十八分爻記月之誤一卦而均傳七分積十一卦有竒而八十分始足則是合六十七八爻之餘分始能共當一日矣然而推之不通也自垢至坤凡卦皆趨乎坤則皆隂能消陽之卦也自復至乾凡卦皆趨乎乾則皆陽能消隂之卦也卦能消陽則其爻不能以直乎陽卦能消隂則其爻不能以直乎隂此不難見也今其積八十分以為一日也法當跨涉兩月則其六十七八爻者亦當通十一二卦而參取也設若時月適在姤復之交則夫十一二者必有以隂卦隂爻而直陽日者矣亦有以陽卦陽爻而遂直隂日者也此乃自用其分爻之指以明分爻之失而破碎卦體乃遂至此他固不足深論也易原卷二
