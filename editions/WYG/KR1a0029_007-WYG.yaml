body:
  text: 易原卷七宋程大昌撰孔穎達揲圖孔之揲法不與易應今用其説為圖貴其誤易也第一大揲係用右手數左蓍扐一掛一當共為二孔氏謂此左蓍揲竟便為第一大揲則其乖誤之由也今取其誤揲者立圖以正其失而策扐多少不可預定則遂因前純乾一爻之策以立凡例例立而他爻悉可𩔖推矣孔之説固不能知乾爻當時之策姑借乾之扐策為言免辭費耳寘扐掛一係第一大揲故有掛不為扐之蓍十十十十七凡四十七第二大揲係用左手數右蓍无掛其右扐為三正名三扐扐右手餘三无掛不為扐之蓍十十十十四凡四十四右按正義概叙數扐出策之例曰易十八變而成卦者每一爻有三變其謂三變者明列第一揲第二揲第三揲而總之以為三變也此其所記三變與易合矣而所從識變則誤也其言曰既分天地天于左手地于右手乃四四數天之數是為一揲則是用右手數左者便名之以為第一大揲也又曰以四四數地之數又為一揲則是以左手數右遂為第二大揲也夫左右手交揲者既已命為兩揲猶當更出一揲乃可應三變之數則遂􅃀然礙誤推衍不行今别出于後孔氏既命兩小揲為兩變矣則所闕者第三變耳又以四十四蓍分二數之暨其左揲所扐又復為二則三大揲皆足而三變已竟巳可畫之為爻矣而其右握半蓍尚未經揲也爻巳成而蓍無所寘其𫝑遂當棄而不用矣夫惟以蓍出卦而蓍不盡用遂有棄者此其為誤不待他辨矣則安可循其法以求通乎易也畢中和法三指皆銜一小指併掛三竒按畢中和法誤全在于祖襲孔氏而已孔氏以三小揲為三大揲則是指一大揲而半者遽云三變已足也夫惟論揲既失其本故其推衍輙皆礙泥而畢氏又以其三小揲所出之扐分列三指又三扐皆出掛一則又因誤増誤也揲蓍説一大衍之數五十其用四十有九分而為二以𧰼兩兩兩儀也兩儀者天地也數之五十者既虛其一以𧰼太極遂以四十九蓍分左右手對握之是從虚一之後分以為二如太極生兩儀然也二掛一以𧰼三從左握取一蓍掛之左手指間故曰掛一也三者三才也所掛之一與左右握而三者象兩儀之大而人參其間也故易之未重也乾坤之爻皆三其畫而與天地人相應正本此也三揲之以四以象四時揲者猶數上聲也自數扐數策悉皆積四數之故曰揲四也詳見兩儀生四𧰼論四歸竒于扐竒者所掛之一也既左右數而得其扐矣則取掛指竒蓍混已扐者而别寘一所是謂歸竒于扐也五揲四出扐四十九蓍既分兩手先以右手數左蓍而疊四計之至全四已盡其有餘數或一或二或三皆謂之扐也全四盡矣而最後一揲猶是全四亦當為扐也故扐者盈四之外所餘之數也得此餘數則遂别而置之矣已又以左手而數右蓍其當揲當餘悉如左法其有餘扐則亦皆左扐同寘一所仍以掛一合諸此之左右兩扐直待三大揲俱竟乃始取夫不嘗為扐為掛者而數以為策此揲法凡最也若其所從為揲則大小有異矣左之數右右之數左則兩手交揲之揲也每左右交揲既竟乃始見扐凡三去其扐而其存者乃始為策策見而後三變皆足三變足而一爻成其在十八變中則此之三變始得畫為一爻也故左右交揲凡六周徧而為生爻之揲者始三也此二者語複而難明孔穎達坐此致誤予故别其分際而異其名稱凡曰小揲者皆左右交揲之謂也曰大揲者總兩小揲之成以為一揲也此之一大揲葢十八變中之一變也用此致别庶其不雜也六扐扐者數之餘也古扐亦為阞考工記輪人以轂圍之阞捎其數鄭氏曰阞三分之一也扐又為仂王制曰祭用數之仂鄭氏釋之曰算今年一嵗經用之數用其什一也扐之為泐考工記曰石有時以泐鄭司農釋之曰讀如易記蓍之扐太元則遂直書為艻范望釋之曰今之數十取出一名以為艻葢以識之也合古語考之則泐扐仂艻也者皆以為餘義也至唐人始謂蓍之銜指者為扐故畢中和又有第一指第二指第三指法也張載程頤不安其説而皆本太元之語以扐為餘今㑹古語以求經指而皆與之合則張程之説信而畢氏誤也夫古謂餘數為扐以其分合皆屬人手故字亦從手不必掛諸指間乃始為扐也繫辭言歸竒於扐是竒與扐明為二事矣又言再扐而後掛則扐與掛亦二事也孔穎達正義以左右兩手之餘為扐復為竒為四揲之餘則是竒與扐當合為一而易語何縁兩出也粗按粗疑祖之訛此言之已知張程二子説經有指矣七張程始正唐人以扐為策之誤自唐以前孔穎達畢中和皆誤以扐為策又以䇿為餘皆失之也至張程出乃始正之此兩論者不必他辨也乾之二百一十六策者夫子固已名之為策矣而此之二百一十六策者乃其積六爻所得而㑹言之也一爻三十六故六爻二百一十六則張程以見存之蓍為策其語正與夫子合矣若孔畢之論則誤也十八揲者當有六掛六掛自為六蓍矣而夫子嘗言歸竒於扐以𧰼閏也若果以扐為策則二百十六策之上當更増六掛之六蓍也是其策當為二百三十有二也此數也可數焉而知也則孔畢之言不合易甚明也八五嵗再閏故再扐而後掛天度多于日躔故嵗嵗常有餘度大率首尾五嵗則置再閏以受之所謂歸餘于終者也蓍之總數猶天之有度也故其掛一之一與夫既揲之扐皆溢出策數之外正如日躔不盡天度而積餘以成其閏也故五嵗再閏者舉其凡也載考古厯大抵前閏後閏多以三十二月而離立相望也假如第一閏在甲年七月則第二閏在丁年二月第三閏在已年十月第四閏在壬年六月雖數疏不皆如此之齊姑舉四閏而率其大致則三年間常以一年遇閏兩年無閏故蓍之三大揲而才用一掛者固倣此為𧰼也初年遇閏者第一大揲有掛者也􅁇乎閏之兩年而皆無閏者則第二第三大揲有扐無掛者也夫聖既用掛一識閏矣猶恐夫人之未察也則又從而詳之曰五嵗再閏故再扐而後掛者見前之歸竒𧰼閏者第一大揲之掛也後之再扐而後掛者必待夫有扐無掛者率至於再而後始復有掛也通前後言之是大三揲皆周而第四大揲乃始再掛也凡掛皆一而一即竒也竒之𧰼即閏也此聖人借閏記掛之詳也九三大揲出扐掛一歸竒出策成爻之序凡左右交揲也徧在十八變中姑名一變在三大揲中則名第一大揲也自此更有兩大揲乃成一爻方其三大揲之已時一欲再也凡嘗記扐之蓍自存一處不入第二小揲數内也第二大揲既已見扐其記扐之蓍亦不入第三小揲數内也須三大揲皆竟其見存之蓍不嘗為扐者隨多少數之一蓍即為一策至此而後方名策數也凡三小揲者其分揲記餘或左或右或先或後皆同一法惟第二大揲第三大揲悉不掛是為異耳其曰再扐而後掛言歸竒之後兩經記扐乃始再有一掛故凡其當掛者是皆三大揲中第一大揲也三大揲中後兩大揲皆不當掛一也諸家或有書掛為卦者下文十八變成卦始為爻卦而此之掛一與夫再扐而後掛皆取銜諸指間以為之義也則當再扐而掛之時未遽及乎成卦也是凡書掛者卦者皆誤也十凖策畫爻枚數事物是謂數得數而記之以蓍是之謂策諸家多雜揉其名則經指全失矣名既亂則實因以紊不可不辨正之也天地之五十五河圖之四十五大衍之五十蓍之四十九皆謂之數不得為策也蓍既揲盡去其竒與扐者不以為數而數其蓍之不為竒扐者是名策數也易曰乾策若干坤策若干是也竒扐與策常以多少對分四十九數竒扐多則策數少竒扐少則策數多率而計之則不過四大數耳凡初一大揲合竒扐得五第二大揲獨數上聲扐數得四第三大揲亦獨數扐數又遂得四此世之所謂三少也三少三多與夫一少兩多一多兩少凡其少多云者其扐數也竒扐者蓍之不為策用者也予之所是者洛法也則其數多少當以見存記策之蓍為正而復仍唐語以竒扐為數者策與竒扐常對分四十九蓍竒扐有數而策數亦可暗數也為其語據要易曉予故因之合此三者而數之竒與扐居十三則四十九蓍所存者三十六以四四數之其為四者凡九矣九四三十六是為得三十六䇿也九者乾數是為乾卦一爻之策也合重爻之六而言則其策二百一十六也此其四大數之一也第一大揲合竒扐而得九第二大揲獨數扐數而得八第三大揲又獨數扐數而又得八世所謂三多也合此三者而竒扐既居二十五矣則四十九蓍所存者二十四也更以四四數之其為四者凡六也四六二十四是謂得二十四策也六者坤數故為坤卦一爻之䇿合重爻之六而言則其䇿百四十四也此其四大數之二也世之名兩多一少而為少陽者謂三大揲之間通其扐數有一箇九有一箇八又有一箇四合而數之是為二十一也此正義語也因數論數語繁則理紊此雖不文貴其易曉故因之或有二箇八而又有一箇五亦二十一也竒扐既為二十一則存而為䇿者二十八也四七二十八故在易數為七而震坎艮本之以成其卦也此四大數之三也世之名兩少一多者謂三大揲之間通竒扐有四有五而又有八則十七也或時有兩箇四一箇九亦十七也竒扐既為十七則存而為策者三十二也四八三十二故在易數為八而巽離兌得之以成其卦也此四大數之四也四大數既具而八初卦可爻可畫矣八初卦既出而六十四卦亦遂可重矣故四大數者易卦之所從出也十一四營而成易孔穎達謂四度經營是也而不指乎何者為營何營而四也韓康伯曰分二一也掛一二也揲四三也歸竒四也故孔氏因之而不復申言也易者以變易為義但一事而前後相變者皆謂之易也四營既足計其歸揲方為第一大揲耳未及乎三扐而出策也而未能遽以成爻也而遂云成易者葢四十九蓍既當置扐歸竒依前後兩大揲者皆從已減之扐已掛之一而數見蓍以為之數是其變易之理已肇于四營之初也且如乾爻第一大揲已足則左一右三與夫小指之一共去四蓍而第二大揲之蓍止存四十有四也則四十四者已異乎四十九之全矣為夫變易之已成于此故命其所始而曰成易也非謂易書遽成乎此也易于四營之下􅁇為之言曰十有八變而成卦夫十有八變者積三大揲而六之數也三大揲者凡六而後積六爻以成一卦則夫四營成易者爻猶未及成也而安肯遽云能成重卦之易也然則其謂成易者葢指變易之理而已也或疑此語太蚤此泥文無見者也乾坤之能為易緼也為其竒耦已具則變化遂且藏蓄于此也乾坤成列而易立乎其中者以其隂陽既已有𧰼則變化亦遂有地也非謂乾坤對列而羲文之書遂成乎此也又曰乾坤毁則無以見易乾坤豈誠有毁也哉剛柔之用既失其宜則交應之位亦紊其常故曰易不可見也變易之道不可得見則乾坤無以周冐乎六十二卦之上矣故易之毁也成也必其倣此以求乃為有得也若謂一爻方成易則隨具無是理也劉朱二子執易有太極一語而求太極于易書之中葢昧此也十二十有八變而成卦三大揲既足而隨策畫爻是蓍之三變已成一爻也重卦成卦之後一卦皆六其爻故有十八變乃成一卦也變即易也欲異其文故曰十有八變十有八變者猶曰十有八易也其例則如掛一之一即為歸竒之竒也一之與竒名異而實同也聖人推原三變于四營之初而總合十八變于六爻之成語簡而交相𤼵也十三孔穎達説掛扐正義曰再扐而後掛者既分天地天于左手地于右手乃四四揲之天數最末之餘歸之合于扐掛之一處是一揲也又以四四揲之地數最末之餘又合于前所歸之扐而總掛之是再扐而後掛也程子曰孔氏命餘數為竒謂掛于指間為扐固有非之者矣而吾亦未遽必其言之非也然既不以竒為一則夫掛一也者求諸易語未見歸此一于何地而孔氏元無所據遂合掛扐為一已非易指矣况若并掛扐以為一義則夫易謂再扐後掛者猶曰再掛而後掛聖人著語恐不肯如許也用張載之説推之則竒者一也扐者餘也揲四既竟乃始有扐有扐矣乃以所掛之一歸之則易語之謂歸竒于扐者􅃀乎其有指也以此見孔氏之于掛扐二義既不得其辨矣而其揲法又自與其所記策數乖戾也正義下文申記策數謂三變中第一變是從左右蓍交數已竟者而名為一變也是通三小揲乃始成其為一大揲也而孔之揲法則遂以左蓍為第一大揲以右手為第二大揲則其為第三大揲者固當再取不扐之蓍分為二而數之矣此既分二法當先數左蓍左蓍既竟則在孔法中已是第三大揲矣而其右蓍猶有一半在手也不知此之半蓍其將安歸耶方欲再數則三揲已足無所用數矣則此半蓍遂當棄諸不用而已不知在易名為何法也故予詳觀正義三揲所得之數四數所定之䇿皆與義合而獨于三揲出數之初全與易戾孔氏實嘗問諸知蓍者其人告以三揲得數之實矣而其三揲所從出數者不肯盡以實告此挾術者之常態也不然則孔氏揲法既已先誤安能以戾易之揲而出應易之策也十四劉禹錫傳畢中和揲法第一指餘一餘三益三益一餘二餘四益二益四第二指餘一餘三益二益四餘二餘四益一益三第三指同第二指右揲蓍數卦從下起指亦自下始第一指法地故益成偶第二法天故益成竒第三法人故同天第一指遇一益三并掛一為五遇三遇二並謂之少與一同第二指遇一益二并掛一為四第三指遇一益二并掛一為四右三指俱遇少通計十三策其餘三十六策四四運之得九為老陽故易繫云乾之策二百一十有六注云乾爻九一爻三十六策六爻二百一十有六第一指遇四益四與掛一為九第二指遇四益三與掛為八遇三亦同第三指遇四益三與掛為八遇三亦同右三指俱遇多通計二十五策其餘二十四策四四運之得六為老隂故易繫云坤之策百四十有四謂隂爻六一爻二十四策六爻百四十四右劉禹錫著畢中和揲法凡七八九六各立之譜今姑摘此三者論之以概其餘焉耳程子曰孔之説揲既誤而畢又因誤増誤也葢其别凡五也三揲者四十九蓍三聚而三分之以嘗三更其揲故云第一第二第三揲也孔之分左右手為兩揲而各出一數予前已辨其誤矣畢氏又因扐為掛遂并三揲于三指則其誤全與孔同也此其一誤也至于每遇某數則益以某數則尤其可笑者也易因隂陽以言天道故揲之四也以四時為則而本天五以求變也夫其揲四變五自然之造化在焉故聖人齋戒其心洗滌其私虛已以聴凡其占也預在四四全數之内者則録之而用以出策其溢出四全數之外而餘焉或一或二三以及乎四則皆去之而名以為扐也其存其去或多或少惟蓍是聴而未嘗敢以已意參焉故得數則為自然之數而所告亦自然之吉凶也易之説蓍曰問焉而以言其受命如響无有逺近幽深遂知來物夫問者人也受人之問而響應者蓍也如畢氏自以意増益則是雖嘗致問于蓍而實取決于已也又其説曰第一指法地不問所得竒耦悉當益使成耦第二指法天亦不問所得竒耦皆當益使成竒不知何所本而言也如是則得竒必使成耦得耦必使成竒直及本占而畢之全無其理也此其二誤也易之掛一𧰼三也者謂第一大揲也後兩大揲則皆不掛今其譜例三指皆掛則三誤也四十九蓍若通左右兩小揲而計扐數則四十九者除其一以為掛而四十八者之在揲也左若餘一則右必餘三左若餘三則右必餘一無有兩遇皆一之理惟其以右之揲左者為第一大揲而以左之揲右者為第二大揲而又每揲率皆掛一則或連有三一然此之兩揲可以應二指所銜而其第三指雖可再取先蓍以為揲左之用而右蓍之无所歸併亦由孔穎達之誤也此四誤也抑嘗取其老隂之譜而本易語以求之去其所妄益計其所實遇則三遇皆四并初揲當有掛一正十三也去十三得三十六正老陽也今其三指所益凡十又増易法所无之兩掛遂成二十有五去二十五則策當二十四正老隂也夫其實占當得老陽而以私意増變遂且轉為老隂不既可笑矣乎此五誤也而他誤有不必辨正也矣易原卷七
