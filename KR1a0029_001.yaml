body:
  text: 易原卷一宋程大昌撰河圖洛書論河圖之圖五行生克附二河圖所起案程敏政新安文獻志載易原三篇其一為河圖洛書而無一河圖之圖二河圖所起三河圖所起標目且誤合為一篇謹依原本校正劉牧易數鈎隱圖所載河圖九位朱震曰本出陳摶四傳而牧受之此圖之附著五行者則豫之所明也案新安文獻志載此篇無劉牧至明也四十字夫子之言易曰河出圖洛出書聖人則之是易于圖書固所兼法也周人寶藏河圖孔子歎河不出圖是河圖也者古盛世實有之非後世傅㑹也孔安國曰龍馬出河伏羲則其文以畫八卦謂之河圖皆厯代寶傳之案新安文獻志無此六字又曰天與禹洛出書神龜負文出川于背有數至于九禹遂因而次苐之案新安文獻志無次字以成九類劉歆曰虙犧氏受河圖則而畫之八卦是也禹治水賜洛書法而陳之洪範是也聖人行其道而寶其真箕子在父師位而典之也案新安文獻志無聖人以下十九字歆又序洪範曰自五行至六極凡六十五字合案新安文獻志無合字洛書本文也夫安國之謂文者數著乎象而錯綜可觀焉耳非謂後世文籍之文也歆謂洛書有字則全與孔異矣夫二子在漢皆號精博而違異如此豫于是疑此時圖書已自不存故各出意想而終無定證也然而劉歆專佐符命正使漢家祕藏有之歆何以不得而見此不可曉也三河圖所起鄭康成則直曰河圖有九篇洛書有六篇說者謂其本諸緯書緯書者哀平間實始有之非古也不可據也而其誤有可以理證者典籍之字生于卦畫卦畫之智發于圖書易謂書契取夬為象是八卦已重而文字始生也若圖書方出而篇章已具則夫子謂書契取夬者誤矣此自可以意曉也特不知漢未逺古二圖尚皆茫昧而陳摶之徒生一二千年後何從得之也然而九位者三列數之旁正縱橫無有不為十五故劉牧李泰伯悉謂非人智所能僞為也劉李之言近也而乾鑿度本出漢世其書多言河圖而曰太一取之以行九宫四正四維皆十五也夫太一非所論也其所謂四正四維環拱一五無往而不為十五即此圖也然則昔之作為乾鑿度者實嘗親見其案新安文獻志作是圖矣其書言七八之象九六之變皆以十五為宿蓋于圖乎得之也乾鑿度也者世儒多有引之以明易指者矣而鄭康成之論大衍以十日十二辰二十八宿為五十而亦自乾鑿度出也晉人張湛傳列子至七變為九曰此章全是周易乾鑿度則漢魏以降凡言老者皆己宗而用之非後世乃始案新安文獻志無乃始二字託為也然則圖書也者乾鑿度實能得之而孔劉反不得見不可曉也案新安文獻志不可曉也作何邪所可言者其四維四正皆為十五正符陳摶所傳則其來已逺篤可信耳且說易者莫古于繫辭矣而繫辭之言圖書也正與天地變化天象吉凶同在聖人法效之數也則謂以數發智者信而可證也謂有字有書者妄也天何言哉而况造字成書明與世接乎右洛書圖亦牧傳也易之天一以至地十正此書之數也揚雄太𤣥曰一與六共宗二與七共朋三與八成友四與九同道五與五相守雄蓋見此書而得其駢立之位故曰宗曰朋曰友曰道曰守也五五行生克異序圖書之寫造化固皆天地五行之數矣而其並數立象有不同者疊八于四而生成相襲者書也書之五德則皆即東南中西北之五位而以序相生也析四為八而羅立以宗一五者圖也圖之五德則又循北西南東中五位者以序相克也均之其為模肖五行焉相生者順天而自左旋右則四時迭進之序也相克者逆天而自右轉左則五德交濟之原也何為順木火土金水次此而為春夏秋冬者是其左行而右旋者正與天合也何謂逆處土于中而水北木東固其位矣金南火西乃與生位相反則皆自右而向左其行正與天反也革天行之序而致其矯夫是以命之為逆也故易之取數也無不絫四而增多即寫四時之序進之而至于八八其卦者也其制變也率皆本五而制衍則依放參伍以成文定象而制其生使入于成者也故圖也書也皆易原也右河圖自有本序今用五行之數附著八卦者貴其相克者之與卦數亦皆見前可考也相克之次厯土水火金木五位而序求之則其自右旋左者皆其展轉相致者也至震木而復克中土則其序一周矣七五行生克相濟五行之既為五材也遂可舉末明本矣雨露之于木薪槱之于火是其能生者也木受斫而材金就冶而器是其能克者也諸如此類生克之理信而有證矣然所談不過形下之器焉耳及夫能生能克者其理必有所起既生而復克也其用必有所著則是超乎器而為道者也理之及此則罕有究而言之者也蓋嘗深思其故矣有隂有陽然後有交有變故隂陽二者未嘗或能偏無而亦不免偏重也惟夫造物者兩存消息之機對出盈虛之則陽進則隂退盛則陽起起故剛柔盛衰相倚以濟生生不窮也古語曰天道其猶張弓乎髙者抑之下者舉之人見其抑隂若陽而退之也則指以為能克也又見其舉隂若陽而進之也則指以為能生也要其實致則皆不離乎更盈而迭虛者也故曰尺蠖之屈以求信也又曰天地之間其猶槖籥乎此二者生克對起之理甚明也蠖屈其體而後有以為信則克能致生之理也槖之不噓則無以再致其翕是生亦能資克也有生有克故暑往則寒來寒往則暑來造化遂以對出也然則生之與克同機括而異形見耳易曰天地革而四時成則其克非生也哉八五行生克之原循五德以求其故則其生其克大抵遇三則變周五則復也五之復也循生數而造極則遂反初也三之變也革其生序而救其偏重也是為同一機括也何謂至五而復天一之水主石為向而厯木火土金迭遞相生盡五而後再返其𥘉也故五德周竟而一水復起也他四行之回復凖此可推也此可以見其有增無損矣何謂至三而變水生木木生火水木火則三矣故水輒克火也火之所生者為土已乃轉而生金既而火又自克其再傳所生之金也亦以三變也金水木具而金遂克木木火土具而木遂克土土金水具而土遂克水則皆遇三而變也三而必變者可以見其盛而必抑也若舉生克之理而驗氣節之序則周五而復者蓋今嵗之除嗣嵗之初也四時皆竟故也遇三而變者中分一嵗而其寒暑相更者也此皆其生克可以事驗而效言者也惟土之寄王不可槩約而理亦不出乎此也且夫生之與克疑不不容參合矣而圖之始北而自右向左以旋也循五德求之則比比相次者皆其相克之位也書之始東而自左旋右也從八列求之則列八相比者皆其相生之次也左右雖異合而言之則其生其克皆以序應也然則河有圖而洛又有書者蓋天地以此互寫生克而啓悟聖人不厭其詳也洪範之一水二火三木四金五土即書序也六府之水火金木土即圖序也方其紀數則用本然之序故初一之五行自水至土顓顓五行耳無所預乎人力也及其致用則相克之理實效乎人其曰六府孔修又曰水火金木土榖惟修者致用之謂也故劉歆約此類而槩為之言曰河圖洛書相為經緯八卦九章相為表裏九五行生克之理斗杓所建而當亥寅已申則四行所生之月也謂木之生于水也以其從亥至丑更冬序者三而其生始著乎寅也是為水能生木也驗之以事則土膏雨滋而木以成質是其顯而可見者也類而推之火之自寅而已也金之自已而申也水之自申而亥也皆一理也惟土之生雖寄體乎更迭之序而四行之類以成體者實不與四行均敵也其曰火能生土木能克土者非夫火力誠能盡豫之以生而木力盡能致克也方且推能回復之理則不容不以序言也亦猶乾坤實生六子而著諸八卦則分位就列反與六子周匝相次也今且即五行以成五材者而求其生克則易明矣回山迤隄能障怒水是水固嘗見克于土矣木根上行壤地為之墳起新畬再種則地力為之退減則木力亦能克土也此其為生為克誠有狀草即木也猶日火皆火月兩皆水也若超回復之序而槩言其祖則天下無不土自根之木也則土固不止于生金而已也茫茫九土皆非灰燼所化也則土生豈專資火也今謂土獨生金而火能生土者姑從五生五克而取一理以明回復焉耳而四行之生之克無不資藉土力者乃其正理也若夫書之叙生者則固協諸四時而易見矣而圖之致克者則常先乎四氣而難推故當别白圖理而詳言之也十漢志五行生克漢儒常言五勝矣最為明審也曰天以一生水地以二生火天以三生木地以四生金天以五生土五位皆以五合而隂陽異位故曰妃以五成也然則水之大數六火七木八金九土十故水以天一為火二牡木以天三為土十牡土以天五為水六牡火以天七為金四牡金以天九為木八牡陽竒為牡隂耦為妃故曰水火牡也火水妃也此正從遇三之變而命其克制也夫水為火牡能制之謂也火為水妃受制之謂也此其立喻兼生克而參言最為得情也牡之能制妃之肯聽則其氣類同而肯相受故其克制得行也蓋木也者資生于水而火也者又資生于木也以其所從得生者而還以制之是皆其以氣類相成者也是故火之牡必屬乎水而不屬土金也水之妃必屬乎火而亦不屬乎土金也既其隔三而資生故亦隔三而受制也他四行可以類推也其說之異于圖者兼用天地十全數而又于隂陽乎詳分妃牡焉則漢儒求以終竟其說云耳其實一土不容分二也至于更三而變者則五德迭相賓主而凡生克之理皆不相戾也圖雖極于九列而一土之五既能克金尋亦為木所克則循三而數皆與河圖之九位無忤也今時為之圖以便稽證十一漢志五行生克應河圖之圖并說係河圖本無十位今將援漢語以明遞克若非悉列妃牡其狀不白于是用洛書十位具配五克使生序之在十位者明而後遇三致克之序始可得而枚數也十二五行相生遇三致克之圖并說用洛右五德率皆互生互克往來交午故豫于五德亦皆假立三位使克彼與見克于彼生彼與見生于彼不相揉雜然後隔三之為克位者始明也猶恐未竟再取漢語疏列于左方使之易考十三漢志五行生克譜凡五天一水生地八木地八木生地二火自水至木自木至火凡更三德則皆以序相生者也相生之序及三則其第三位遂見克于初生之位故三生而克見也何謂三生曰水生木木生火是之謂三生也故水之能克乎火也是隔三而命克位也其曰克者非有的然可指之迹也大抵一年之間寒暑相變最為大節故謂水能生木而又克火者主冬之能生而夏實受克也既取其能先春以導陽而又能先秋以變隂也率以半朞為斷也所謂天地革而四時成者由此而可類推也土之生金而又克水也其為半朞之間能起隂而又能發陽亦猶是也秋金冬水俱為隂類而其克金者必以火則本所從得生以見其所從受克焉者也若夫土也者實常該乎四行之上而貫乎一朞之久雖循序以言而曰火能生土土能生金其實即夫可以形求者而言之耳若要其實則四行之大無一行焉而能不資土力故一朞之間亦無一日焉而不載土德也是故惟土不可以定序而言也天三木生天七火天七火生地十土自三木而為七火十土是為遇三故漢志云木以天三為土十牡言木能克土也天五土生地四金地四金生地六水五土四金六水三也故漢志云土以天五為水六牡天七火生地十土地十土生地四金七火十土四金三也故漢志云火以天七為金四牡天九金生地六水地六水生地八木九金六水八木三也故漢志云金以天九為木八牡十四圖書入易易雖不言何者為圖何者為書而意指所及可究考也其于開物成務冒天下之道則歸諸十全數而成變化行鬼神又歸五十五數也夫此十全數者五十五數也則皆洛書也又曰參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象此之參伍即十五也通參伍而三之則四十有五也四十有五者河圖也然則天地之間明而為物務幽而為變化大而為天地之文廣而為像物之象皆不出乎圖書所寫之數則夫作易之初雖曰仰觀俯察近取逺取莫不有得而其機要出于河洛兩圖者特居其總也此圖書入易之凡也詳見五論十五參伍參伍者取一五而三之以為十五也猶參天者取天數之一三五者兼而用之以為乾九也用參天之法以觀參五之則而五之錯乎三以總乎四十五者可明矣而說者傳致夫雜恐失統也且夫圖之三其三列而縱橫旁正可以羅絡而數者悉皆十五也是其錯而可綜者也羅絡者其錯也㑹三五以為十五而又三其十五以為四十五則皆綜也若其錯綜所及則功用不勝其廣矣天地十全數竒耦相間固嘗有文矣而其相交相變以極乎萬有千䇿者非藉此之錯綜則隂陽不能自形乎象數則夫子謂通其變遂成天地之文者用此理而通用此通而成也推一五而三之以為十五十五已見又從而三之則夫始而象四變五也已而為參兩之九六也已又為七八之六子也則八純卦已成而六十四者悉有其象矣己又取八純卦者疊置而八之則凡天地人物事為吉凶何者當為何象何象當生何驗遂皆可以聖定也夫子所謂極其數遂定天下之象者如此其極而如此其定也故聖人尊尚變五謂其功用該貫一易者皆圖數也十六一朞節候纍五而三河圖寫其數參伍錯綜之象雖著乎圖豈自為若數也哉一朞氣令莫非基乎五而變乎三故發揮其情而寫諸象數焉耳何謂基五五日而為一候七十二候而成一氣絫三氣而成一節則又從十五者而三之也三其十五即四十五矣四十五者具而一節具一節具而一朞之日居其八一矣故圖之五則不獨演五及九而不可復演也三其參伍者既能以一起八而亦不事更演也今取圖數而槩氣令則知其應矣一五中立而錯出為八所向莫非十五夫非一候而三之以為十五者歟三其三列而十五者凡三出也非其絫三氣以成一節而為四十五者歟以此之四十五者而致參伍之變于八初卦之間則凡圖數之一周也其于出震終艮之序正居八分之一也是為八重卦之一也以一槩八而一朞之卦為六十四者悉其可以通而極之固自不事再變矣而前謂不容他變者又有深理也變之極乎三其參伍也是五數至變之極也何以知其然也五雖得為變始而九實常為變極也主五而及九則始變之五既已九出矣運五之九亦又九變也是兩皆臻極也若强益以五則四十五者遂為五十矣夫四十五之不為五十五也藏地十子四行而不使不變之十贅出乎其間也何可更于其上益五以為五十而强裁地十之半以入變中也故圖之極于五九也自立則以至應用不可少少增損也至夫大衍之出别為設數則其理又非正用五行矣不可槩言也詳見設數十七易用河圖參伍立數參伍之入易也大率三變也以四象而遇天五是其初也夫其四𧰼析數則既十矣益以天五則十五也是參伍之初入乎用者也取一三五者而參之以成其為九九出而乾見矣取二與四者而兩之以成其為六六出而坤見矣以九合六又十五也是參伍而再用者然也九貫生七震坎艮出焉六貫生八巽離兑出焉則參伍而三用者然也總而言之一變而四象遇五功用以始今蓍之所著凡揲數出䇿無不立本于四而聽變于五者是也二變而九六有象乾坤以成則易之藴于是乎具矣三變而七八對峙六子以生則八卦具而可伸之以為六十四矣六十四者具而易成矣夫子嘗謂小成之變引伸類長而天下之能事可畢者其原亦出于參伍也是皆聖人發智于圖之錯綜者而定著合期之𧰼以成其為易者然也十八易數以合朞為準易數之得天也以參伍也從一五而參之至為四十五者凡八而其數遂為三百六十矣從五日一候者積之及乎七十有二也其數亦三百六十也三百六十者一朞之日也出震終艮則其分寫此數者也然則一朞之氣令固該乎此而一易之象數亦具乎此矣是故乾坤之䇿其數固為三百有六十矣乾坤一索為震巽而震巽六爻之䇿亦三百六十也再索為坎離三索為艮兑其六爻亦皆三百六十其䇿也此八重卦者行乎五十六卦之上而其分䇿以為卦體也莫非合朞之數也故易之立數雖其深賾難究而竟以合朞為成也十九逆數夫子列叙八卦相錯而繼為之明曰數往者順知來者逆是故易逆數也此正參言圖書成易之由也往者指氣所趨而言也易之廓四為八而出震終艮者是也從其往而數之則皆倣天而左旋故其數遂為順數也來者逆推四氣于未然者也圖之三生致克而寒暑可以前知者是也其生其克實相矯革若不翻變書序則無由可以參伍也故著之于數則為逆數也于是總一易而言其凡則參伍之成為九六九六之𣲖為七八九六七八錯出而為八卦八卦又從而八之則易成矣此逆數可以成易者其序然也若稽其逆之所始則三生致克而一歲之間變暑為寒反寒為暑是其放以立數之要也細細推之則三其五日之候而為一氣三其十五日之氣而為一節亦其五行遇三致克之積也何者十日之運是五行之再周者也日之運而及五則五行已其一周矣以一周之五行而又三其周遍焉則三而致克者其理亦可凖五德以推也故三候而變為一氣是一逆也三氣而變為一節是三逆也三逆而成一節八節而成一嵗則一朞之數莫非成乎積三之逆也故夫子槩謂易為逆數也詳見論三二十圖象曰書象斗太𤣥之測天也其别有二順天而推則曰斗一北而萬物虛斗一南而萬物盈逆天而推又曰日一南而萬物死日一北而萬物生二者全相拂異矣拂異之間矯革行焉其相須以濟者正在是也故太𤣥又從而明之曰日之南也右行而左旋斗之南也左行而右旋或左或右或死或生神靈各謀天地乃并天神而地靈然而逆順合并也者正其生克之能相資者歟故書數率同斗運而圖數則略如日行也是圖書也者正造化祕藴而天地寓之象數以發悟聖人者也聖人既得此象則又創立立極以為法萬世也其曰易有四象所以示也是其致也是故蓍龜之神也天地之變化也天文所垂之象也河洛所出之圖書也四者均在所法而亦均在所示也就四者而别言之惟蓍龜位乎有易之後自當從卦爻以求而其天地之出變化也者即四時之生之克是其都㑹也天之垂象也者即斗日逆順是其綱要也圖書也者又其生克之著乎象數者也及夫㑹四者為一而者諸易書則大衍又其總要也此一易之凡也二十一三數始異終同三數雖異而終歸一揆故可尊也圖之周回八列也固嘗變置火金之位矣而揆以書之疊四則雖更易置而四行之生成自相次比者原不至于離析也是故三八之木一六之水仍其相依于東北而四九之金二七之火亦皆相倚于西南也惟其相克之與相生必資變以致其成故其布列命方不容不異焉耳而無害其為同也若夫圖以入衍衍以成卦則四正之位仍是書序未嘗紊亂也乾坤艮巽雖略變圖位然而反諸天地生成之序與夫隂陽分明之理則皆協合無間也木水處乎東北則三八一六既相附以立矣金火位乎西南而四九二七皆聨比無爽也以是知圖書本為一理而聖人設數以追寫其妙乃能如此之精也嗚呼微哉八卦分明詳見論數易原卷一
