body:
  text: 易原卷三宋程大昌撰論數十四篇一本數用數設數水火金木土𥘉亦無數也而其生或遞相輸灌者有漸有積聖人既知其度而無言可論故必立數以紀而後𥘉終漸次學者始可序求也然則五行也者葢其託數以記實而非因數以得體也故天一之一其在十全數中固甞為一矣已而見諸耆象則包乎兩象之中向之為一者不得復専其一矣安可見其在天為一而謂天下之一皆在是也洪範五行水居其一即天一也此其為一特以冠五行而首出故名之曰一耳而五紀八政亦皆有一也歳也食也是皆一也若見五行之一為水而謂五紀之歳八政之食皆為一水可乎不可也故凡指天一以為太極之一者如執歳食而言一水者也是皆不能隨事索理者也於是易之言數雖不一途而其立數之原則派别為三不可雜已何謂三曰有本數有用數有設數本數也者自然而然天地之十全數是也及其載之洛書亦此之本數也用數也者倚本數而致功用也河圖倒易水火以明克制則本數之為用數此其𤼵端也惟夫四象所象之四參伍所倚之五則皆直取天地五初數以為之用也及夫三兩之成而為六九也六九之派而為七八也天地元旡此數而聖人設焉以追冩變化者也凡此之𩔖皆為設數也二設數本數已具而未入於用用數未起而人未知其所用則本數也者雖曰實其有之是亦徒數而已也若夫何數可以入用何數不可為用則皆不容其意徒擇也聖人也者探其情要約其歸宿别立一數以斂散之使不可得見者皆形見於所立之則而其參差不齊者又皆終㑹於一是設數之所由起也設數云者本無此數而以理剏立也正夫子謂言不盡意而設卦以盡其意焉者也此其設卦則正從設數以出也易本無卦天地圖書亦本無大衍一數也是故聖人之設為大衍也其數非數也虚一之一非水也象兩之兩非火也八卦之八非取象於巽木而七八六九之在耆者亦非水火木金之成也皆其本無而剏立夫是以名之為設也是故本數猶川也用數者知川之可浮而即焉以行其舟者也設數則出舳艫之外置維楫以操縱之者也今從三數者各立之譜而明其以也三本數凡兩譜天一至地十析數為五十五數讀如所右皆實有此象乃立此數以記之推而極乎百千萬億皆記實也自有此數而後世之欲名事物者其多少先後率資此以命其序也天之十日地之十二辰卦之為六十四經禮之為三百甫刑之為三千號物之盈而為萬皆記實也記實也者一二則誠有一二千萬則誠有千萬第第相次不可少損損之則闕不可少益益之則贅以是知形變之一既其得之於天説者乃欲即之以求生兩之太極確乎其誤也用數本數之别詳見參天兩地譜地六天七地八天九地十右此五數者五行成數也而凡易數之出於乾坤者元非此之五數也其用已統於四象故也乾坤之初為九六九六之出為七八其為九六七八固甞並此立名矣然姑且依以為凖焉是倚數也倚者依也實非正以為用也故地六以至地十此五數者不為用數而仍為本數也四用數凡三譜河圖一至九洛書之自一至九自水生以至金成皆以本數居本位以其未入於用故也至圖數則異矣變西金而位之於南變南火而寘之於西以著其相克之序者是其用也則夫火之二也已遂為克金之用矣金之四也又已其克木之用也是已非其本然者矣然則天之示此數于圖也亦已明言當用之機以昭示夫人矣詳在圖論而凡聖人之擇數以入乎用者未必不發智於此也天一地二天三地四天五自一至五為天地五初數自六至十為天地後五數槩而言之則十數者莫非五行矣析而求之則五初數者五行受天地𥘉氣而純一不雜者也无方數之變化莫不管是雖五後數者亦皆資如乎此也故易之取數无不用四其制變無不用五者立本而該末也是故方其未用則為本數及其入用則為用數也參天兩天竝天之一三五而合其數為九九並地之二四而合其數以為六天地固有此數矣聖人知其可用而差擇用之此其所以獨為用數也然地四以前四全數者既甞用為四象矣天五一位其獨為五者又甞立為變祖矣至此而又參天兩地則遂再入於用也此有以見五初數之該徧事事物物无不由乎其出也故亦不容不以此為用也或疑一數不當兩用則泥矣五設數凡七譜大衍五十五行之五十五者實有五十五象故並實有以名實序今損其五以為五十則天地本無此數也直以推測所至後先漸次无所云識故借實數以識虚象而已也故衍之所及上不為五十五而下不為四十五者以虛攝實聖人設數之智也詳見後篇參天兩地三數之别惟於參天兩地可以兼攷也葢一三五二四天地元有此數是之謂本數也知一三五之當用而參之知二四當用而兩之則五𥘉數者皆入於用是之謂用數也一三五本不為九二四本不為六今其參之兩之而合其數以為九六而九六遂為一易卦祖則是本无此數而設為之也虛一五十數之總有一數焉不入四十九用故後人以虚一名之而實无此一姑借一數之能始萬者以形容太極所奠焉耳而聖人猶不肯正以一名則可以見其不為實有也矣惟其元非實有故可以虚之而无闕也楊氏葢甞則其理而著為太元矣其曰一元都覆三方者是也三元之覆三方也三方者入八十一數而一元未甞預乎九九也此正放太極之一而立為此則也則安可從實有而求太極也𧰼兩此之象兩葢借地二記二之名以識蓍𧰼焉耳故兩儀之位正次虚一是天地皆在象兩之中也則其謂二也豈從地二得數也哉夫是之謂借數也自此以下凡其借實有之數而名剏設之象皆放此也象三所象之三三才也而非取之天三也掛一於分二之後者以象夫人之參覆載而為三也及其記䇿之爻既已叠三則自下而上地人天相次而位者是其三也六畫既重則又兼三才而兩之矣八卦自天一至地八數非至此而始變又非至此而變極直取四時之氣起四正而周四隅者其方面凡八也故遂倍四為八以識其位而一朞之數悉有𨽻屬是正借八為數而名其有耳用九用六凡卦六爻爻既六故爻辭之與小象亦莫不六也槩六十四卦悉同而獨乾坤二卦上九上六之外復有用九用六者焉有辭無爻有意無𧰼此在易書則設數之尤著者也他卦不設而乾坤獨設者他卦之剛柔已具則雖直循見數遂可致用無闕也至夫純乾則純於剛故積九而龍亢純坤則純於柔故積六而龍戰亢且戰何可無救也其曰羣龍无首者用剛之道貴乎應而不貴乎倡也是謂能用其九也利永貞者雖其立體當順然必能不苟為隨乃云善用其六也是皆本无此爻而以意立用此其所以為設也洪範三徳於剛克則沉潜之於柔克則高明之沉潜高明也者畏剛柔之過而立則以致矯者也若夫正直也者則常不剛不柔行其所無事而已不必更立沉潜高明二救也然則沉潜而用其剛高明而用其柔夫非用九用六之意乎六用數設數之别聖人賛易慮後世雜三數而混言之葢甞從用數設數而别言其用矣第其言微隐可以意㑹而不可以數求焉耳六十四卦之内從方體而言則曰裁成輔相也裁成輔相者所立在此所因在彼則是後乎天地而奉之者也出爻卦而言旡方无體者則曰範圍天地之化範者器之橅也圍者周物之身而挈度之也曰範曰圍有包括天地之象焉則是人者先之而天地莫之能違也此用數設數之别也而設數所起又有夫子之語可以推證者矣則予前甞論設卦之𩔖設數者皆以其本无此象此數而創意為之故得名之以設也七九六倚數名爻設數之用至能操縱天地圖書使其異數合為一數此聖人剏物之智也而其齊不齊以入於齊者正在九六七八所倚之數所名之爻也何者天地十數陰數常多陽數常少如天一而地二天九而地十以是其則也夫其陽之必少于陰者在天之象必少于在地之形也以虛實凝散而分多少故也使聖人于此不能别立推測之則而于陽徑取其少于陰徑取其多則夫數之在陽者與夫爻之為竒者率甞為陰數之所葢冐矣故聖人之于倚數也别有操縱之道焉十全數者五陽五陰固甞對出矣陰之進則極乎十而陽之進僅及乎九也此其為極一也而聖人之倚數也在陽則取其極九而陰之極十者不取也非徒不極乎十也引而伸之直逼夫五起變之地无數可退乃始取諸地六此其立為抑陽舉陽之則者亦已至矣及其名爻立義又益有異也乾之一其畫也以象天一也其數實一而已而遂名其畫以為九坤之兩其畫也以象地二也其數倍一矣而反名其畫以為六是又抑陰舉陽之甚者也于是反本末而對推之方其自然而然也陰之多常過於陽及其抑多舉少而及乎此也則陽九之于陰六率常贏三也積而多之陽又太張而陰又太减矣于是又于九六之派而有相輔相除者也九雖比六而多其三然九之出而為七也遂已明損其二矣六雖比九而減其三然其出而為八則遂明增其二也此皆其立數以矯偏而對施盈減者然也設數而及乎此則天道之張弓也鼔橐也尺蠖之屈信也其中有機聖人率皆攬取以入乎設立之數矣夫其出天地而加範圍焉其非此𩔖矣乎八合設數問或曰實有之數自然而然者也所謂莫之為而為者天也今謂聖人而能設數則是自然者可以使然也曰予固言之矣本數猶舟也而設數則出舟外而立維楫者也順行舟之理而求其可以操縱者耳非外立一則而拂其當然之理也是故聖人之設數也減陰之十而立名以六减陽之九而定數于七非人真有所削也既已極陽數而取之九矣又遂從六派而取其八亦非能有所增益也是皆因其自然而然者也惟其知所參擇焉而措之于數以冩其裒多益寡之機以成其抑高舉下之則以求權夫太盈太减者而使一陰一陽之道見乎寓筭立則之地焉耳而其於多少之自然者元无一毫變𥘉也至此而後知夫聖人之設數者其範圍之妙能超象數而斡象數也然則設數也者豈其舎其自然而强以使然也歟此與設卦以肖陰陽者其理正同故予甞援之以明設數之所自也九皇極无數洪範八疇其族𩔖皆可枚數而皇極一疇无數可命也謂其不著事功也耶其派流所播與人為徳則其徳已三與事為福則其福又五而皇極不肯自别于五若三也此其意象殆且凾萬於一是人事中之太極也故其列諸九疇雖甞序次在六而此之一五實能該乎九疇之九非五數之所能域矣則夫太極之强名以一而實不為一者又其象也若夫天一之一則特五行之一水焉耳五行之五也水其一也以一并四而相與為五葢以實數而紀實象也如曰虚一之用當屬此也則火金木土直四行耳而安得云五也總其該而言又如九疇而去其五行則八疇耳强為九其又可得乎故天一之不可虚也既已入于形變矣形在焉而數與之俱不容剟去也若夫太極也者總統五十而不自預乎五十之一也則古聖人之秉一无迹者其𩔖尚可意逆也堯舜相與語冺迹狀而傳心尹湯所恊該徳善而居總孔子所貫又非多學而能識也則夫一之所寄其真有耶抑其无也此王弼之謂非數而數以之通者也五三六經孔子要妙實皆在是弼豈偏宗老氏者耶十圖數已入八卦自甪圖序配卦之圖竝説二離火七艮火六坤水九乾金一坎水四兑金三震木八巽木右圖序雖甞改變書序然其於五行生成仍自相屬也水之坎一坤六火之離二艮七金之四兌九乾木之三震八巽一生一成謹相聨綴元不判别也十一八卦分朋之圖地六水坤地四金兌天九金兌地二火地十土天五土天一水坎地八木巽天三木震天七火艮十二六卦分朋附乾坤始吾見八卦之次惟四正得位而其行列布乎四維者既非循書亦不用圖乆之未解其故暨得坤彖分朋之理而求諸六子列位之次見其陰陽皆以類聚而遂欣然㑹意曰本乎天者親天本乎地者親地則天地氣𩔖之真也于是又有以見八卦分主四氣亦非聖人以意定著也何者震坎艮三陽卦者位乎東北无一陰卦而能附出其間是為東北之朋矣而乾亦位乎轉北之𥘉以統涖之也巽離兌三隂卦者立乎西南亦无一陽卦而能附出乎其間是西南之朋矣而坤亦入乎西南以受之也夫謂我朋老我之所主也則我之謂朋者主我者也故朋北之朋皆主乾而西南之朋皆主坤也推極其致則九實生七故三陽卦皆其男也六實生八故三陰卦皆其女也男女父母其取義固重於賔主要皆凖氣類以言氣𩔖而已也則夫乾坤之得為天地也以其凡陽凡陰皆自此立總也予于是又有以知天五聚著乎乾而地十聚著乎坤也故凡陽附乾而凡陰附坤也其位序方面亦自可推也夫惟陰陽各附其𩔖則復乎天地竒耦之初矣故凡天地之數在書而全入衍入圖而減及其㑹輯為一乃遂彼此無二此非天地至理出乎自然而復乎本然者歟故卦象至此而易遂以成也十三卦數夫子未甞正言卦數也獨於説卦命坎為水故論數者得以知坎之為一而離震兌之當為二三四也非必他證也以𩔖而推則一行可準四行也然則乾九巽八其必從說卦之謂為金為木者而命之為九為八也矣是亦夫子之言故亦不必寘辨也惟夫配坤以六配艮以七說卦既无明指又且坤既為地而復以水為艮既為山而復以火配人因疑之此不足疑也易象變遷葢有不勝其言者矣故皆舉一以告而待夫悟者之反三也若謂坤地所包者廣而不當為水則乾天愈廣矣而何以局乎九金也謂艮為山而與火不當同屬則夫堅多節者亦己屬木矣既可為木何以不可為火也于是後世沿易起算如十日十二辰五聲六律陰陽太一雜然各立一數以自成一家不容參合矣而其五行真數載諸天地圖書以及卦象者未甞少少改變也如三八之木二七之火不以何地何用凡其得數在三在八則皆仍為本也及得一六亦必為水而四九亦必為金也故由其得數之末尚可推之五行之為何屬也是夫四正得數稟之五行而事事物物莫不由之以出故亦未甞輙異其𥘉也若夫衍所衍固其本諸四象之與天五矣而其自出之變則設為之二而二非水火也設為三四五而三四五非木金土也若循衍數以言本數猶用日辰聲律之𩔖而言易也十四三數為大衍可取四䇿四䇿之可以成卦也惟五十數而後四無一闕也蓋甞進而取五十五退而取四十五悉用大衍蓍法虚一掛一而後四四數之凡其五十五者已自全不應䇿矣而四十五者則三䇿中有六七而无八九也何者四十五既已虚一已而义復掛一其在用止於四十三耳于四十三者設使四十三者又當去其十二矣則其在而為䇿者但為三十有一耳則夫三十二而為八三十六而為九无由形見乎四䇿之内也故夫大衍之四䇿固其取則于圖之參伍者矣不圖之用而别設五十以為之總者蓋惟增此五數然後數之在蓍者七八九六隨占隨得无有揲足而數不足者亦无有扐見而䇿不應者詳見揲蓍策數百占百成悉不虚揲亦無一揲而能别出他數以與七八九六相亂也暨四十九之用既已固具正存一位以奠太極耳其无一贅虧也則是大衍也者其於應造化而出爻卦莫之能尚也故易之卦數悉出於此也夫惟非圖非書而圖書得之乃始可成此聖人範圍天地之妙也易原卷三
