body:
  text: 宋程大昌撰易原卷八論卦二十六篇案論卦二十四字原本在古筮議卦篇上第一篇反脫總目通前後諸篇考之自重卦非文王篇至春秋時取卦不以百篇皆論卦第餘篇俱佚僅存一二二十二十四二十五二十六六篇耳謹校輔總目附識于此原本第二十篇又誤移第二十四篇後并校改􅄲重卦非文王案新安文獻志載易原三篇一河圖洛書二重卦非文王今考原本河圖洛書論及五行生克論共二十一篇相次北篇並不與相比不得列一二等目謹校正揚子雲曰易始八卦而文王六十四此不然也世之有杵臼書契也蓋取諸益夬也而益夬乃重卦也如曰卦至文王乃始重爻為六則臼杵書契豈其至周始具也耶夫子言易曰十有八變而成卦夫卦之一爻即蓍之三變也十有八變則六爻矣䇿之立也以三百六十者為總也而夫三十六者之得為二百一十六也二十四者之得為百四十有四也皆六其爻而四乘之也則易之在䇿遂已重爻而六矣豈待至周而創為也案新安文獻志作豈待周邪無至字而創為字也作邪周官之紀三易也其經卦皆八其别皆六十四連山夏也歸藏商也夏商之世八卦固已别為六十有四矣夏商二易卦名時有見諸先秦之書者其名則皆周名也此又可以見夫八卦之為八八己在夏商之前矣夫易也者案原本夫字上有而字易字上有周字謹依新安文獻志校正前世必皆略有其辭特未備耳至文王周公相補足而後卦爻之辭始備故岐山箕子遂皆列名乎其間有以見周人能補案新安文獻志作禆闕而增成焉耳不曰爻之三者至周而始六也其書之以周名也猶言至周而成也蓋豳之七月其正朔率皆用夏而序詩者又已明言其為后稷先公之詩則是未有成周先有此詩矣今其擊之于豳乃遂載周為名者識其入經之世也豫惟周易之繫于周正此類也案新安文獻志無豫惟字也字楊氏因其名之冠周也而遂以文王名之恐不審也案新安文獻志其不審哉二設卦占卦之别隂陽卦之本也取諸圖書大衍而著諸爻卦者皆是也蓍䇿卦之寓也爻卦皆定而後寫其數于四十九用焉耳非其立數之自矣夫子之説卦也曰聖人之作易也幽贊于神明而生蓍觀變于隂陽而立卦發揮于剛柔而生爻以若語而紬其序則蓍在卦前變出蓍後有類乎蓍能生易矣故後人因用四䇿而傅會以為四象也特不悟䇿之有數蓋其受之于易焉耳而非能與易立則者也夫子説易而先于卦者正為叩蓍得卦者而言之非其追言伏羲作易之始也且夫天地事物之理固其蓍諸卦爻之辭矣然而皆該言以待擇非能預主一人而言一事也世之君子將有為也將有行也如治任適逺者車馬舟楫無不畢具而前途或旱或水不能預決其用也必其揲蓍得卦而後卦當入用者始有主名也故夫子將言卦變而先之以蓍者此其旨也如以辭而已矣則夫生爻之語益又後乎立卦也矣豈其不待有爻而卦巳先之也歟于是六十四卦夫子命其德為方言其已定而不易也揲䇿得爻之卦夫子命其德為圓言能隨事而出卦也則夫蓍先乎卦者是十八變而小成者之序非伏羲立卦初則矣二十古筮議卦無引及三卦是一重卦止于一變左氏國語載筮固多而其論筮亦詳蓋自令蓍以及得卦而又及夫測卦也其所得爻畫與去推考之説歷歷俱在又有一占兩儀而交相駁正者凡其所及卦象與夫相為議論皆有可以推想其制度之不存者矣遍考兩書獨無攙出兩重卦已上者以是知此時一占所用止于一正一變而正變率皆取決于九六之初遇也故古法六爻之中有一變而無再變不與劉氏所説同也何為一變而無再變也曰初爻遇九六則初爻固為變始矣二爻方遇則二為變始自三及上凡九六未出而創始一出者皆為初遇也既嘗一遇矣則再遇者皆在初遇之爻以入變卦别不更自出變矣此蓋主易則以求變而非背易則以主少也二十四蓍卦與重卦先後之序豫之折卦而論上下也則夫知蓍而能取卦者必有議矣何者六爻測義既自下上而蓍之著畫亦自下始也則是下卦之來反居上卦之先也茍下卦而果先乎上卦也則下卦不可命為創來而豫謂剛柔之來自卦外者皆非也此大不然也以易言也卦之序有揲蓍取卦之序豫之本彖而論卦體也以易言也故謂剛柔自下而外來者是重卦之初取下卦于本卦之外者也故外卦得以先據其上而迎受下卦之來也至夫蓍䇿之出畫也固嘗自下而上矣而其六位巳成之後推測所及則上卦之當先也下卦之當後也仍用重卦之初則未始紊斁也是理也亦惟泰卦所著最為明盡也蓋坤上乾下泰之卦位也小往大來泰之卦體也蓍之纍畫成泰也三奇先焉而居下三耦繼焉而居上是誠下乾先乎上坤矣然推測之際仍以坤之三耦主卦而指三奇之乾以為自外來重也故謂坤之以小而上往也乾之以大而外來也仍與重卦之先後秩然相應也二十五聖人不專用占案新安文獻志載易原三篇此篇直標三字今按原本有二十五三字則此上必有闕篇謹仍其舊易之尊蓍也直為其神可以代易而聖人得以洗心受成也洪範之斷大謀也凡已意之與國論直不自主而皆取決于龜筮也夫其稿骨枯莖果可信伏以及此乎蓋聖人尊易而因以及蓍者也案新安文獻志無者也二字蓍尊而後易尊也易之經秦而得不焚者竟以此也若求其本則是以蓍為導案導原本作尊謹依新安文獻志校改而使人向易焉耳若其卜筮則未嘗全以主信也古之聖人之猷為悉可考矣舜之命禹也禹請枚卜舜蔽己志以言曰朕志先定鬼神其依龜筮協從卜不習吉豈其專以蓍定也案也新安文獻志作邪周公之穆卜國事也令龜之辭謂許則歸而俟命以待其愈不許則屏璧與圭以為不神亦不以不遂所請而信疾之不愈也然則聖人之于人事卜筮其先後固大有序矣易之為書不為卜筮設然而無蓍以出卦象則臨事不知卦之所擇也故卜筮為用易之要也若聖人立教之道則常置仁義于隂陽剛柔之間不專取成乎卦象也矣案新安文獻志無也矣二字如曰師征丈人吉非丈人而屬弟子則不吉矣碩果不食一象也而君子以之得輿小人以之剝廬也沿此類推之則卦同而人事異其禍福不專從卦也故善補過者終以無咎而悔亡者乃遂往無不利也與案原本無與字謹從新安文獻志校補二十六春秋時取卦不以占春秋之世有得易意者不待致筮求卦而遂以意説卦至其事之吉否率皆如言則直伏理為筮焉耳子大叔知楚子之將死也以意取復頥二繇而知之也醫和推蠱以言晉疾也亦非筮而得之也知莊子之舉師臨以言晉軍也史墨之以大壯而言魯難也卦非出筮而事情曲中則仁義當否固可以回轉隂陽也是理也聖人則既以明言之矣而人不察也曰君子居則觀其象而玩其辭動則觀其變而玩其占象在占前則得其辭而玩之者常以仁義為準則也當于仁義則舉不當則不舉此為深淂剛柔節適之妙也若然者設使性命大謬雖不逢吉亦常無咎也公冶長邦有道不廢邦無道不戮其禍福之制在己而不在人也則夫玩占于既動之後以較玩辭于未動之先者其賢否智愚相去逺矣此卦筮之微旨也附一篇案此篇應屬論卦二十六篇之上苐原本脫其次第之目謹附于後連山歸藏不傳連山歸藏之以不變為占别自一法固不可移而入之周易矣而又夏商二易本無變卦今乃用魯史傳會之言反周易之不當致變者而用以為變豫故重疑劉氏之誤也蓋左氏國語所載凡其筮而得八者嘗三出矣小白所得則屯正豫悔皆八也董因所獻則泰八也並在晉語穆薑所得則艮八也凡其三出而皆無變卦也則古謂連山歸藏以不變為占者信矣然嘗即左氏而推所筮則夏商兩法不獨無變卦而已凡其所引繇辭若非周之易語則必周之卦法也然則連山歸藏所為不傳者豈非以其徒卦無辭而難于推用也歟又非以其有正卦而無之卦則遂推繹不逺也歟大率禮文之事至周而備若夏商則皆未及也故周常詳而古皆略不為三書為然也孔潁達之在唐初既己不見二書矣而深疑夫筮史之傳會故其言曰假令二易俱占七八不知此筮為用連山為用歸藏也是孔氏不以魯史之附會者為信也况又有可疑者焉既己兼用七八為占則所得之策有八亦必有七矣何由所載三占遂皆得八也此皆理推而不通故豫亦欲從孔氏之闕疑也辨疑邵鄭復始生卦邵氏雍鄭氏夬立為復姤生論之論曰乾坤大父母也故能生八卦復垢小父母也故能生六十四卦豫雖不見二氏全書而朱震所傳亦已略見梗概矣然豫有疑也乾坤之能生六子也八卦之能生六十四卦也以其本無而創有故得命之為生也若夫復垢之得成重卦也乃其合乾艮坤巽四初卦以成其體焉耳若謂六十四卦由之以生也則是艮巽反生于復姤也深求誤則有為而然矣隂陽消長形乎爻畫則少者常先多者常後祥見隂陽六十二卦往來圖故二子因之遂立為少能生多之則以至于倒易本原而不覺也況夫一陽之畫積而極之必成六陽六陽乾也一隂之畫益進則必成其六隂六隂坤也若謂一隂一陽能生二生三以極乎六也則乾坤亦在所生也此如譜諜不明敘次孫曾之世于其父祖之先則誤不待辨矣而其間議論有似經而實戾者是故不可不竟也二古卦以數同相比與鄭邵異二子同失在于以爻變言卦變也既以爻言則全用竒耦數同以為之類則又展轉生誤矣易指生乎竒耦竒耦同則其氣類似若可因之以參求其度矣而有不可專泥者不夫位置稍變則得失禍福遽以相反故數同而類異也聖人之初重易也固嘗有取乎此矣今之卦序自乾坤以至未濟凡其對立而聨出者皆以數同之故也則夫數之同者實有至理差擇至精或以取其相因或以鑒其相反意似而理又應則遂舉以相從不然則否故六十四卦凡以同數聨出者多則四卦少則兩卦未嘗踰四也夫豈不知竒耦數同者不啻十卦而其聨出未嘗有及五六者蓋以取理為重而以取數為輕也若夫二子專于取數焉耳故豫未敢以為合易也三邵鄭異同鄭氏循六爻以言變邵氏則極三而止凡其六也三也説雖各異而其取必于數之齊同則二子一律也鄭氏之以六變也蓋取復姤六爻者由初及上而六出其變也是並乾坤六之卦而創為此意也然而以數少為隂陽之初以多數為隂陽之末則大父母之六其奇耦者反為小父母一奇十耦之所生則其論自駮矣已而浸覺無本則遂去乾坤二卦而專用復姤巳下各五之卦則其誤可以見矣若夫邵氏之主三而變也不聞乎隂之若陽也而皆以一畫生兩畫兩畫生三畫是取一生二二生三者以為之宗主也世以其言有本故亦尊之然豫考其首尾而不喻者多也夫其立一二三以為生次者為夫愈出而愈多故本其所出以為之原而謂少能生多也今臨遁之類凡二十八卦而泰否之類才十有八卦而已是以二十八而生十八也是愈出而愈少也以較初立之則謂夫二能生三者全相牾也此豫之不喻者一也六十四卦八八相入闕一不可而邵氏于乾坤坎離乃遂不以入列也至于既濟未濟乃于二十四對中兩出而重著則豫之不喻者二也乾坤之三索重卦之八八中皆有交變之理為之脈絡故六子之生乎乾坤也六十四卦之生乎八初卦也其中有往有來迹皆可考也今徒類聚卦數而以多少相承絶無脈絡聨綴則其謂某類自某卦而來者亦不見其何以為來也此豫之不喻者三也豫既得二子之言而不得其所以言則遂求理于易而别有可以發明者矣而不敢以不量自已也四邵鄭本之卦而不用之卦乾之之卦則復同人履小畜大有夬是也此六卦者皆序受乾爻以成其體者也故其一奇之間乎五耦也于復則在初于同人則在二而履三小畜四大有五夬六則此之一竒亦皆自下而上間五耦以成其為六卦也是其序之可考者也故二子類聚卦之五耦一竒者也立復以為變始也其見蓋出乎此也坤之之卦則姤師謙豫比剝亦其六爻之以序出者也其一隂下上乎五陽而機緘相屬亦與乾同也則二子類聚一耦之卦而立垢以為變始者所見又皆出此也故二子論變雖曰半同半不同而其釐異乾坤尊表復垢使之可以冠冒十卦者蓋一意也二子之創為此論也必皆樂其十二卦者之一竒一耦可立乎二隂二陽之上而領袖乎三陽以下也故同立此見而無所差殊也已而覺其十二卦者推焉而泥不能通諸一易則遂減去之卦本則而取復垢以冒其上也故復姤六爻而邵氏僅收其五者以其本出于乾坤之六爻六變而強去其一故也故凡二子立則推其依並乾坤變卦則彼來此往輸承悉有源派自此以外輒皆推演不行故豫反本而思立為乾坤正變之圖以明之也于是先立乾坤兩卦以該其上而下復姤兩卦以加十卦之首則夬之卦初則遂以昭然而明也苐不審二子别有思與否世而有深造其藴者也則豫亦樂聞豫誤也乾坤之卦圖乾之六卦履兌下乾上同人離下乾上姤巽下乾上乾小畜乾下巽上大有乾下離上夬乾下兌上右乾六爻之出而為六之卦也姤一同人二履三小畜四大有五夬六其次甚明兼又六爻六變無由可以缺一邵鄭欲信其已説遂剟去一姤别而置之以為一陽五隂者之祖今取復之一卦與姤卦序立而二子所立之則其為出自六卦者甚明矣坤之六卦謙艮下坤上師坎下坤上復震下坤上坤豫坤下震上比坤下坎上剝坤下艮上右坤六爻之出而為六之卦也其序則一復二師三謙四豫五比六剝是也餘理在乾下復姤之卦圖復之六卦謙艮下坤上師坎下坤上坤坤下震上復豫坤下震上比坤下坎上剝坤下艮上姤之六卦履兌下乾上同人離下乾上乾乾下乾土姤小畜乾下巽上大有乾下離上夬乾下兌上右復姤之爻當出六變而邵鄭所取皆始乎再變已下者正欲表復姤以為變始故不得不移乾坤而别置之以合已説也此圖既立而二子傅會之因按圖可見矣乾索坤成三男乾二求坤二成坎坎乾乾三求坤三成艮坤艮乾三求坤初成震震坤索乾成三女坤二求乾二成離離坤坤三求乾三成兌乾兌坤初求乾初成巽巽右乾坤六索索者求也以陽求隂以隂求陽凡往而有求則為索也坤之初成三爻也純隂而無陽也乾往求之而耦初遂變為奇初是一索而變隂為陽也其曰震一索而得男者猶言震之為卦是求之一求乎坤而遂以變陽者也自此以外如乾之再索三索而變坤以為坎艮也坤之三索三變而成其為巽離兌也理亦猶是也此之謂爻變也易原卷八
