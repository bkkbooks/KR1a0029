body:
  text: 易原卷四宋程大昌撰論一凡七篇一諸家説虗一異同案原本脫論一總目謹據他篇校補古今推大衍而傳者如京房馬融荀爽鄭康成顧􅌚韓康伯董遇孔頴逹近世劉牧胡旦皆其自出機柚追想易本非不力也然其推説五十五者己自隉杌不定故朱震輯衆説而折𠂻之厯詆其迂且違者皆有歸宿已而自致其説則明稽鄭康成之減五暗用沈括之虗一意蓋厭諸家膠執而欲圓機以通造化其思精矣然以其説其求諸易多不合也康成用十日十二辰二十八宿以應五十之數蓋乾鑿度語亦京房語也而揆天地五十之外尚餘一五未有所宿遂謂五行之氣流通乎五十之中故其流通者不可得見此其意自以為得減五之一矣而不知等為五行中又自分子母母能該子則一土固能通諸四行矣子皆受氣于母而不能自出氣變則水火木金安能迭相該貫也哉則又何自而能流通隱見也又其所取日律星宿也者特以己意決擇而傅足之若沿類以求則氣數物象與其所取相當者尚不乏也試以其類而增減之則其增也既不覺贅其減也亦不覺少非有確定不易之理則與馬融之增北辰荀爽之增用九用六亦何異也震因其説而遂采之以為數本則夫三大數者或一其五或三其五又或衍五而十凡其何以參差不齊者震皆不能致察則失其本故也括之言則曰四十九蓍聚之則一而四十九隱于一中散之則四十九而一隱于四十九中靜則歸于一動則惟覩其用一在其間而不可取也震又因括説而廣之曰五十去一則一在四十九中使四十九去一則一在四十八其説皆未確也二誤以實一言借一一之可虛者為其借數寓名不與實有之數相次相比故虗之而無所闕也若夫天地之十全數者實著其位實致本用語已在論數中此其為一是天一之與地二相次而可以枚數者也虛之則五行遂且無水而十全數無亦遂無所發始也如之何其可也也劉牧之虗天一也朱子固己詆之矣曰若謂天一居尊不動則筮者當置一䇿以象天不當言其用四十有九也震之詆牧似矣而謂一在四十九與四十八中則又大非也震於衆蓍同為一握之時以其同而未分者命之為一此全誤也抑不思虗一之語起于五十數者闕其一而不以入蓍故得名以為虗也若在握所有止於四十九是直四十九耳本自不為五十則亦本無此一而命何為虗也是説也孔頴逹其實倡之故謂皆不得其解者多折而歸之也茍如諸子所云虛數在四十九內則易之立文當曰大衍之數四十有久其用四十八也此旡他不知設數本數之别而從定數以言虛象方欲不虗其一也其總五十而其用止於四十有九是明遺其一而旡以究其所之也必欲别指一一而虗之以應易文耶則出四十九用而求之茫乎其旡取一之地故不免于支離其辭也且震之言又曰凡有數者莫不有一一之所在旡往而不為萬物之祖夫謂一為萬物之祖意指太極也故旡間乎四十九四十八而一皆可去也雖其可去而一之為一亦旡乎不在也然究其所從言之一則非太極萬之一也其言曰凡數萬不有一既謂之凡則有疇有類者皆是也正劉牧所謂在天為天一在乾坤為𥘉九在十日為甲類類也是謂冠冒同類之一而非該總萬類之一也正震之所譏而又躬自言之此古人所以置論於目睫也與若夫易家者流用天下以為太桶之一者十人而九不止此之數子也姑即其嘗有議文者從而正之以期易本之有明耳讀者用吾言而求諸三數苟知夫殊塗而同歸者率以太極為宿也則虗一之不為天一自如白黑也三老子説一本易惟王弼能知王弼之釋大衍曰演天之之數所賴者五十也其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之太極也夫從五十全數以觀四十九之闕一而知夫所虗之一是為太極蓋已深得易旨矣而曰不用之用非數之數尤其申明道總也世之溺象數而不能通諸易理者率常以虗旡詆之此特習聞老氏科條常與儒忤而不知其書本自易出也夫旡思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與于此此蓋易繫贊明數變之功也夫惟數變已定能使體易之君子未與物接則泯思為于無有及其應感而動輒能措酬酢于盡善則夫太極之散而在易者尚能使不用之用存乎四王弼説虛一是理也惟老子得之最深故言之最該其曰無為而無不為者不専為蓍易發語而王弼能知不用之用非數之數者正從此語而得其流灌之用也故夫用蓍之四十九者萬物也五十而虗其一者能生兩儀四象八卦以及乎萬物而不見其生生之迹者是也故其能生者在易為通在易為用在老為旡不為其不自生者則太極之生生立獨而易之無思無為寂然不動者也思為皆泯即老氏取之以立無為無言無事無味之目也其在孔孟則舜之旡為禹之行其無事堯之順帝而不識不知文王之儀而無聲旡臭皆是也從其不自生而無所不生不自化而無所不化者合而言之則妙萬物而神者也聖人亦慮其理之起象數而卦爻之語所不能包也蓋嘗對為之言曰神無方而易無體也又曰一隂一陽之謂道也夫有方有體則皆物也雖天地陰陽亦物也用不離物而功超物表則妙萬物而不測者也是運雷風水火而坐收動撓熯潤之用者也故六子役於乾坤而説卦之於妙物也不以天地入六物之列也是故役以一為主以神為至也善者晉人孟景翼之論一也曰一之為妙空元絶于有境神化贍于無窮為萬物而無為處一數而無數莫之能名強號為一推此言也而入諸易則太極之該衆萬者有則可求矣五易以一為祖以神為至一者從虗出實太極以之生萬者是也神者積實化虗以可測之積而致不測之用者是也故妙萬物而言之也變化運乎冥冥固難究言而卦爻之理茍不逹諸性命人事則易為無用也于是借人事可見者以推天地之難見者則倫類相朋也蓋喜怒哀樂之未發也一未為兩有太極之象焉及其發也喜與怒對哀與樂對類而推之有仁則有義有禮則有樂有上則有下有是則有非諸如此類則昔之一者皆出而分為兩矣自兩以往非迹轉多則去一轉逺故信善美大自二中四下者積而上之皆求及乎化也苟及乎此則皆會其散而返其初矣及其初用既至不散而會則一之今也一則信善美大皆無可見之迹而隨感皆應有一能生萬之象矣當仁而仁欲義而義遇禮智而出禮智人莫見其勉且行而其德之日出者蓋嘗泛應而曲當也此正伊尹所謂一而日新者也凡其日新之地化而不膠故迹之所出人見其然而不知其所以然也其在孟子則謂之聖不可知而在易則為不疾而速不行而至也是皆人事之本乎天理而可相發明者也從易道而對言之則自生蓍立卦而推極乎盡性至命者其理一也王弼曰太極者無稱之稱蓋有見於一未為兩之𥘉其理邃矣而劉牧譏之朱震和之則皆無見乎一見神者也則其譏之冝也蓋牧震和之所長者象數也數之中精義入神者固在而二子之言象數則亦不出乎象數也冝其不喻無有之真也特不知無思無為者果如聚魂積塵全無心思作用也乎于此無見冝乎求太極于有形無形之間也故王弼之學遺數而易師之學泥數遺數者理不異數尚可推而逹之也其専于言數者則直數耳而遂有不與理會者也故易指至于偏倚也六一神一陰一陽之謂道是在象數之中形焉而上者也陰陽不測之謂陽則不獨形而上之且出象數之表矣若夫蓍者有數可數有象可稽未至甚頥也而聖人之言蓍數也則嘗盛稱其神矣于大衍則曰可與祜神于變伍則曰天下之至神既謂蓍之物神又謂蓍之德神者此非専以贊蓍也易寓于數數寓于蓍易神蓍亦神也故嘗論之神生于化化生于變變生于剛柔之交凡陰陽之遞代寒暑之倚伏皆其物也交而變變而化則無轉為有舊革為新人見其速且至而不見其疾且行也是妙物而不囿于物本乎陰陽而不可測度者也有其效而無其迹是以命之以為神也夫其既神而迹泯者不容言矣而陰陽之交且變者其消息有初對代有漸盛衰有序從其初且漸漸而序者次比記之夫是之謂數數具而神藏乎其中故易自一陰一陽以後則皆數之可紀者也自隂陽不測以往則無數可紀矣有數可紀者易書也不出于兩相變易也無數可紀則兩相變者皆泯其節而無不為者皆不見其為也殊者同百者一則能復乎生兩之𥘉矣故曰以一為祖以神為至也然而蓍法既傳知理者悉能有見則豈人人而能神歟聖人言其可以神者而待夫人之能神者也故又曰神而明之存乎其人默而成之不言而信存乎德行七一能無為無不為列子之論生化曰生物者不生化物者不化自生自化自消自息自智自力自形自色謂之生化消息智力形色者非也此正指太極之運生化而能無為者也其語蓋出于易也下繫之論曰天下何思何慮同歸而殊塗一致而百慮天下何思何慮日往則月來日月相催而明生焉暑往則寒來寒暑相催而嵗成焉往者屈也來者信也信屈相感而利生焉推其極致則窮神知化者可以由此其有得也此易之言一以逹乎神而列子得之者也其曰自生自化自消自息而旡生化消息之者則何思何慮而順往來屈信之自然者也夫其可以旡思無慮者亦非委其具而付之自爾也日月寒暑與之為役而已得據其總也已據其總彼效其詳已則無為而尊彼則任責而勞彼常往來屈信遞代而此則坐取生明成嵗之利即蓍之所蓍虗一不用之象也夫一雖虗於用外而兩儀以至六十四卦皆受此而致之分離揲歸以成其用萬物千餘之策者是其所謂無為而能無不為者也是正生化消息智力形色若不出諸己者也故人不見其為而常有與之為之者也莊子曰陰陽四時運行各得其序惛然若亡而存油然不形而神萬物蓄而不知此之謂本根此又列子之言言而詳陳之者也陰陽四時運行得序不形之神存乎其間則並與易之變化生神者言之矣萬物皆受生育之德而不知其孰為之是見四十九而無見于一者也覆載之內萬物之衆皆受生焉安知兩儀之上更有生兩儀者哉此太極也故莊子指之以為本根也孰謂老子之徒專于談虗也哉論二凡五篇一因明失得易生于一立于兩故一出而兩見兩見而一藏也暨夫變兩之極化而及神則混泥為同向之兩者亦遂不見而一自復矣此合易之始終而究言其剝復者然也詳見總論若夫易之名書也專以變易言之則凡象若數雖其屢遷屢變而皆不出乎兩相更迭也非兩則無變舍變則無易也其曰一隂一陽之謂道者是兩之可以出變者也又曰一闔一闢之謂變是兩之終能成變者也用此求之凡其相錯相雜相得相易相薄相摩相蕩相推相感相攻相取相逮相悖者莫非以兩為體而形見乎相交之地也人而知夫兩之所當而措焉則可以常吉而不凶也苟惟不能參觀而倚于一偏則其敝必至于知得而不知喪知進而不知退知存而不知亡也故夫子之言易曰因二以濟民行以明失得之報二即兩也二之可以濟民也即參彼我而裁可否之謂也其為失得之報則用兩之當否有以取之也故聖人于此焉而務白也二事物悉載二極天下之大萬物之衆事為之夥而其形體情實無有不相配對者也寒暑日月雷風晝夜山澤水火君臣父子夫婦牝牡道器剛柔仁義治亂進退生死得失吉凶榮辱有萬不同而無有孑然獨立者也夫其每出必兩者何也陰陰其實為之也陰陽之出出也太極則其總也及其既出也則天地其初也事事物物無有外乎天地而自生自立者矣而天地又從太極而受陰陽焉故事物之無不有兩者其源實出于陰陽也于是究其極而言之天之陰陽即地之柔剛人之仁義而卦爻之乾坤也四易其地四變其名而皆不離乎兩也故兩之播也可可勝原而兩之所從為兩則一陰一陽正其總也六十二卦無一卦焉而不載乾坤則何事何物而非兩出也故説兩明而易之本易著矣措兩明而有得無失矣宜乎聖人之濟物者務明乎此也三易總數悉為二為致變之地易之數固無不用四矣然究循其本則直倍兩耳天雖有一有三而同于為陽也地雖有二有四而同于為陰也四時之四亦終總于寒暑也是四者皆其即兩而倍焉者也易卦用八八其八而六十四焉則又從倍四而加廣焉耳其祖無不自兩也不獨此也卦一之象三純卦之畫三則二既成三矣而聖人又遂兼三才而兩之乃從六爻之六以求成其為昜則雖用三之後猶復以兩為宿也與後論三通故聖人作易也措兩之理既具列諸附卦之辭而其明兩之機尤著乎立卦之序也凡今六十二卦其先後相綴無非取諸竒耦相同者是其則也今譜列左方四六十二卦竒耦多少凡四譜卦上標數即是卦之本序連四卦數同凡二十八卦三屯四蒙並二竒四耦下放此五需六訟二耦四竒七師八比五耦一竒九小畜十履五竒一耦十三同人十四大有一耦五竒十五謙十六豫一竒五耦三十三遁三十四大壯二耦四竒三十五晉三十六明夷四耦二竒三十七家人三十八暌二耦四竒三十九蹇四十解二竒四耦四十九革五十鼎四竒二耦五十一震五十二艮四竒二耦五十三漸五十四歸妹五十五豐五十六旅並三竒三耦連兩卦數同十一泰十二否十七隨十八蠱二十一噬嗑二十二賁三十一咸三十二恆四十一損四十二益四十七困四十八井五十九渙六十莭六十三既濟六十四未濟已上十六卦並三竒三耦連兩卦數同凡十二卦十九臨二十觀四耦二竒二十三剝二十四復五耦一竒二十五無妄二十六大畜四竒二耦四十三夬四十四姤五竒一耦四十五萃四十六升四耦二竒五十七巽五十八兑四竒二耦前一卦與後一卦數同凡六卦二十七頥四耦二竒二十八大過四竒二耦二十九坎四耦二竒三十離四竒二耦六十一中孚四竒二耦六十二小過四耦二竒五卦序卦自有理而二十四卦悉以竒耦數同者次比為序是其理著乎數而聖人欲從致變之地主其同以究其變也于是數同而類别者其多至于四卦而其無類可比獨為一卦者猶隔卦相匹也是六十四者無一卦焉而不與他卦竒耦相配者也以是知聖人之因貮而明失得者其于因數致察如此其審也序卦之自乾坤而極未濟也率皆相受相入而於其未特為之言曰未濟易之終也夫其指未指為易終則是六十四序者作易之初既已定著之矣非夫以意推説也蓋致變之地必屬屬乎此而三乃有措也三生于二見論二一一生二二生三三生萬物天地圖書之外别有一二三者焉非復五行之一二三矣是謂聖人設為之數也此之謂二也一陰一陽是其總也尚其有莭可求也至于一之立總而生二也三之合二而出也也則皆虗虗而難究故太極之一豫既不憚辭費矣而三之為三凡易之合兩起變者莫不屬焉可謂要且該矣而豫之論數未暇亟言者慮其名稱相汨反以紊經也然則孰為三曰一生二二生三三生萬物其語雖始老氏而理本易出也一之為太極也子固數言不待申復矣自二及三夫子固嘗極言其總而曰天地絪緼萬物化淳也男女搆精萬物化生也夫其天也地也是為兩矣兩之合也别有絪緼者出焉既不可分以屬其亦不可别而為地又不可斥諸數外則安得不參乎二而成其三也凡易之從二出三者者其象皆總乎此也故夫子隨舉男女以配對天地而期夫人之總乎此也故夫子隨舉男女以配對天地而期夫人之類求也然則男女之搆精即天地之絪緼者矣絪緼者與天地而三而其化既可醇矣則夫搆精者合男女而三其亦可由此以生也凡天下事事物物物從交而變從變而凝者莫不出乎此之三者而凡三之類悉可放此以推矣二天地男女兑艮男女云者以人言也人雖可名以物而物理不同乎人也今于男女搆精之下槩萬物化生言之猶曰男女搆精者其理即萬物所從化生者也是蓋舉隅以告而期夫人之類推也若要其所宿則天地男女也者實指乾坤六子以為之原也故作爻辭者從損之兌下艮上按象而為之言曰三人行則損一人一人行則得其友甚言隂陽相二而乃有一可變也詳見後論且夫男女也者隂陽之賦乎人者也以類觀類則凡分𣲖于隂陽而兩相配對者莫非男女相二之理也二在而三自形其于禽獸蟲魚凡有血氣者則皆以牝牡相二也而搆精者自參其間也其在日月雨露霜雪山川水火草木凡因氣凝聚者則以隂陽為二而二之交亦即為三也及其著而為理麗而為事則夫剛柔竒耦利害當否凡其彼此參互之際無不因三以致其成也故論二明而三始可推也牝牡而搆精即隂陽之騰降者是其理矣人事之有利害也利害之相感發也則亦天地絪緼之理也絪緼之在天地蓋其二氣方交而欲變者也自此益進而至于凝結則形質具而為物矣迹狀著而為事矣極天下之大而凡事凡物莫不因交以出變故亦皆因三以成體也此其三能生萬物之則也且夫三之距萬數之相絶不勝其逺也矣而老氏之言道也一之生二也二之生三也尚其可以序求也三之所生不至聨比為四而遂隔越為萬豈一其三者遂能生此之萬也哉凡萬莫非三出焉耳考之于易則凡有形質者莫不資生于三其理甚著也豫故謂此理之為易理而非老氏臆創也三三人損一一人得友大傳既發絪緼搆精之理乃始正引爻辭而為之明曰三人行則損一人一人行則得其友言致一也此言凡從隂陽而得實體者無適而非二也實有之象莫著乎人矣三則損一是損三而就其為二也一則得友是益一而成其二也損益之間率以及二為底止夫是之謂致一也盡易一書莫非主兩起變即皆以二而底底止者也詳見明二于是天地男女皆二也二具而三自形則從二得變者是也故老氏表發其理而立為二能生三之論以補三聖人之所未言也若夫易之從二言三而三能成物則不勝其多矣而皆有可案案故而求也方其言總則曰一隂一陽之謂道繼之者善也一隂一陽而道自隨之是其善也人之所為又能繼道而時當則為善矣是善之資生乎三者然也及言卦本則又曰乾坤其易之緼耶乾坤成列而易立乎其中矣是又用乾坤易相參而三也易立而六物可紀矣及其參會同殊一百之理又嘗從日月寒暑屈信而明立分際也其言曰日往則月來月往則日來日月相推而明生焉暑往則寒來寒往則暑來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉夫日月寒暑往來屈信其非乎兩體對出之中有相推相感者焉如絪緼之非天非地而實别為一理也則安得而不三也己又從其相推相感者而致諸可以成物之地則嵗也明也利也悉皆隨之以生也是物雖有萬不同而無不稟生于三也十三卦之敘物物也凡棟宇弧午杵臼舟楫衣裳書契之類無有一物而能自出一用者故夫子謂備物致用立成器以為天下利也然則器之成也雖其形而甚下猶須備二致三而因三成質也况其形焉而上與之立總者乎四隂陽之合為三易象既成而為書也隂陽之交有互體相人者焉凡曰相錯相雜相得相易相蕩相推相摩相資相感相攻相逮相悖是皆合二以成其互者也二其分也互其合也分之外有互焉則不得不三也原其始則皆隂陽而交焉者也故者氏于三己生物之後又嘗即其所形而明其所始矣曰萬物負隂而抱陽沖氣以為和夫且負且抱是二之相交者也負抱之中有和焉則萬物之所從為物者也詳見豫所著易老通言莊子又推本此理所出而明言之曰至陽赫赫至隂肅肅肅肅發乎天赫赫出乎地兩者交通成和而物生焉是亦指夫肅肅赫赫之交者以為兩而兩之通以成和者為三也兩以三出而物生矣是又即三之未及生物而老氏之語本末末相感者也五實三設三夫子于乾坤出易之地其言三尤為詳審也曰乾坤毁則無以見易言無二則三不可見也乾坤易合而成三已見前論又曰易不可見則乾坤合機乎息矣是又言三不可見則二遂覺于無用也夫乾坤天地也天地安得而有毁也曰隂無陽助陽無隂佐或者偏用隂陽而失其交通成和之理如乾亢坤戰亦皆未免偏倚于一也則下乎乾坤者其為毁特易也是隂陽兩對之間而輒毁其一則遂無地可以出變三無從而生也三既無託以自形則二之可以出變者亦遂窒塞不行矣故二毁而三遂息也夫子之言三也蓋如此其該且悉矣然謂行行必損其一而三人必及于疑則又不足常恃此其故何也曰是有妙理焉有實三有虛三實三也者其象其體可以枚數及三者也積三畫以成初卦兼兩三以成重卦挂一象三之為三才六其三揲而為十有八變皆其實有此三者也為夫體質己具故云六物既曰物矣則其功用所及不能越出形範之外也今由六物而推其象則凡為人為器為事為異類盡其所得定體而以數數之可以及三者是皆不能自運而有待乎運之者也世之知道者至此而能與之揣切增損然後功用始白于是畫既三而又重以三焉人既三而必損其一焉人己一而期得友焉皆其曲從隂陽至理與之調適其偏而求以追明乎出變之祖者也六實三設三虛三也者本無數也以化醇化生之則次第求之其序則當在三而此三實無形質也于是循號物之數率十以言則夫自三以降厯四十以及九十自當次數而老氏道序殊不其然蓋三外徑以生萬則此三也固固無在三之質而實能攬擅生萬之用故得目之以為虛三也然則既曰三矣則有數可識矣而尚得謂之虛乎曰不獨三也自造化未為萬已上一也二也也三也皆借數也故雖天地男女寒暑日月往來屈信凡其數實在二者夫子亦不嘗正以二名也其所謂二則凡有隂有陽不至偏乏則雖數過乎二亦為一易因二濟民之本也于是復之五耦一竒得為有陽之卦而坤之純耦積爻至六乃遂嫌于無陽即其理之甚明而可例者也此其為二豈可循實數以求也于是即虛二而推虛三則三之有其次而無其質者其三益妙也率此而上之太極據生兩之表而不肯名一者其象數益虛矣嗚呼微哉七三損一一得友象在損三而損一一而得友此損一爻爻之辭耳而夫子引之以該一易者何也一二三變化之原效乎變卦重卦者象適聚此故夫子即之以立槩也損之得為重卦也合艮兑以成體者也類而推之此六十四卦皆與損同故其友而友得者可以通諸一易也卦初無艮因乾之三交乎坤也而遂以一竒二耦為艮也初亦無兑因坤之三交乎乾而又以一耦二竒為兑也是兩卦初變以為六子而凡卦變莫不皆然者也故其三而損一者亦可通諸一易也于是從卦以求一人得友之象則夫損之積爻而至于六三也兑三畫之竒耦其用已竟矣自此而上六四以及上九則自屬艮而不屬兑也卦法自下而上為往兑之以其六三而聯屬乎艮之六四也其一卦上行而别與一卦相得者也故其為象正如一人行而得友也于是又從變卦以求三行一損之象則夫坤之初卦也者其三畫本皆耦也及夫出而為艮則三耦變一以為竒矣乾之初卦其三畫本皆竒也及其出而為兑則變一以為耦矣是皆三畫之出而變損其一者也故其象為三行而一損也夫此四象者雖形于損之六物而八卦之自始及終悉包乎六物之內故爻辭之與大傳得從一友之語以該明一易也八二之取象以陰陽配對不専用數之多少易之謂二本無定數而凡能兩異相兼乃得為二也其在造化則以兼有隂陽為二而隂陽之或多或少不間也及其入畫則以兼有竒耦為二而竒耦之或多或少亦不拘也及其畫而成卦則此卦彼卦又復為二亦不以竒耦多少為間也是故乾坤初卦各以三畫為父母是嘗以三畫共象一人矣及其分𣲖而生六子則三畫各為三子則又以一畫而象一人也若其既已重卦則重乾六爻乃遂共象一君重坤六爻亦遂共象一臣是爻畫之日一及三自三及六凡其一也三也六也皆可取以象一人元無定也夫子之論象曰聖人擬諸其形容而象其物冝是故謂之象則凡易之為象取其可以擬似而已耳非其體質實然也則夫象類之或少或多何可膠泥也所可知者必其兩相匹對乃能彼此交濟以開物成務焉耳故聖人槩論易理而曰因二以濟民行者本隂陽以言二而達諸人事以見凡三悉生乎二也未及乎二則偏而不該茍過乎二則贅而為礙故乾坤之三必損一者純竒須耦而純耦須竒乃能生生不窮也是蓋以竒耦對出為二而不以三畫為拘也兑必合艮是少女少男相會成二而夫二竒一耦與夫一竒二耦者皆不枚數而折配也雖夫子至此亦不肯發機竭告而槩以致一為言使人思夫三則損之以及二而一又益之以及二者其所歸宿率以一人行三則疑也是亦一理也一人也者乾之一竒坤之一耦皆其象也乾以一竒入隂坤以一耦入陽皆得為行不必更拘三竒三耦之當為三人也且即其三竒三耦以求疑則其疑可言矣位置已定無所交感爻晝率若凝立不動則無圻于決矣夫安得而非疑也其在重卦則夫艮兑仌畫既嘗兼三而重六其體已足若使艮兑之外更有一卦如震離之徒儳立其側則此言山澤兩象既已對出則損之卦地已自元可容受又安得而不名為疑也故小象之疑即大傳一致之反也易原卷四
